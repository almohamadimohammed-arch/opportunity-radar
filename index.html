// ─── STORAGE ───
function loadData(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;}}
function saveData(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch(e){console.error(e);}}
function getApiKey(){return localStorage.getItem(“radar-api-key”)||””;}
function setApiKey(k){localStorage.setItem(“radar-api-key”,k);}

function extractJSON(text){
let c=text.replace(/`json\s*/gi,"").replace(/`\s*/g,””).trim();
try{return JSON.parse(c);}catch{}
let d=0,s=-1;
for(let i=0;i<c.length;i++){if(c[i]===’{’){if(d===0)s=i;d++;}if(c[i]===’}’){d–;if(d===0&&s!==-1){try{return JSON.parse(c.slice(s,i+1));}catch{s=-1;}}}}
d=0;s=-1;
for(let i=0;i<c.length;i++){if(c[i]===’[’){if(d===0)s=i;d++;}if(c[i]===’]’){d–;if(d===0&&s!==-1){try{return JSON.parse(c.slice(s,i+1));}catch{s=-1;}}}}
return null;
}
function purgeOld(items){const cut=Date.now()-RETENTION_DAYS*864e5;return items.filter(i=>new Date(i._fetchedAt||i.date).getTime()>cut);}

// ─── API CALL (with user’s API key + browser access header) ───
async function callAgent(messages, apiKey, useSearch=true){
const body={model:“claude-sonnet-4-20250514”,max_tokens:4096,messages};
if(useSearch)body.tools=[{type:“web_search_20250305”,name:“web_search”}];
const resp=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{
“Content-Type”:“application/json”,
“x-api-key”:apiKey,
“anthropic-version”:“2023-06-01”,
“anthropic-dangerous-direct-browser-access”:“true”,
},
body:JSON.stringify(body),
});
if(!resp.ok){const t=await resp.text();throw new Error(`API ${resp.status}: ${t.slice(0,150)}`);}
const data=await resp.json();
return(data.content||[]).filter(b=>b.type===“text”).map(b=>b.text).join(”\n”);
}

{data.title&&<div style={{marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${C.border}`}}><div style={{fontFamily:”‘Crimson Pro’,serif”,fontSize:22,fontWeight:600,marginBottom:6,lineHeight:1.3}}>{data.title}</div>{data.subtitle&&<div style={{fontSize:13,color:C.muted,lineHeight:1.5}}>{data.subtitle}</div>}</div>}

{data.pestel?.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:“uppercase”,letterSpacing:“0.06em”,marginBottom:10}}>PESTEL Analysis</div>{data.pestel.map((p,i)=><PestelDim key={i} name={p.name} rating={p.rating} detail={p.detail} color={PESTEL_COLORS[p.name]||C.gold}/>)}</div>}
{data.risks?.length>0&&<div style={{background:C.surfaceAlt,borderRadius:8,padding:16,marginBottom:20,border:`1px solid ${C.border}`}}><div style={{fontSize:10,fontWeight:700,color:C.red,textTransform:“uppercase”,letterSpacing:“0.06em”,marginBottom:10}}>⚠ Risk Assessment</div>{data.risks.map((r,i)=><RiskRow key={i} {…r}/>)}</div>}

  </div>);
