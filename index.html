<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Opportunity Radar v4</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0A0C10;color:#EAEDF3;font-family:'Outfit',sans-serif}#app{padding:16px;max-width:800px;margin:0 auto}.card{background:#151922;border:1px solid #222838;border-radius:8px;padding:16px;margin-bottom:10px}.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-right:3px;margin-bottom:3px}.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;border:none}.btn-g{background:#C9A227;color:#0A0C10}.btn-g:disabled{opacity:.5}.btn-o{background:transparent;color:#8B95A8;border:1px solid #222838}.btn-o.on{color:#C9A227;border-color:#C9A22744;background:#C9A2270a}.inp{background:#1A1F2B;border:1px solid #222838;border-radius:5px;padding:8px 12px;color:#EAEDF3;font-size:13px;font-family:'Outfit',sans-serif;outline:none;width:100%}textarea.inp{min-height:60px;resize:vertical}.hdr{background:#10131A;border-bottom:1px solid #222838;padding:0 16px;position:sticky;top:0;z-index:99}.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:50px;max-width:800px;margin:0 auto}.tab{padding:6px 10px;font-size:10px;font-weight:500;color:#5A6478;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Outfit',sans-serif}.tab.on{color:#C9A227;border-bottom-color:#C9A227}@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:20px;height:20px;border:2px solid #222838;border-top-color:#C9A227;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}.bar{height:4px;background:#222838;border-radius:2px;overflow:hidden;margin:4px 0}.bar-fill{height:100%;border-radius:2px}.posture{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}.warn{background:#F59E0B12;border:1px solid #F59E0B30;border-radius:6px;padding:10px;font-size:10px;color:#F59E0B;margin-bottom:10px;line-height:1.5}.inval{background:#EF444408;border-left:2px solid #EF444444;padding:8px 10px;margin-top:8px;font-size:10px;color:#EF4444;line-height:1.4}.assume{background:#4A90D908;border-left:2px solid #4A90D944;padding:8px 10px;margin-top:8px;font-size:10px;color:#4A90D9;line-height:1.4}</style></head><body><div id="error-display"></div><div id="app"><div style="text-align:center;padding:60px 20px"><div class="spinner" style="margin:0 auto 16px"></div><div style="color:#8B95A8;font-size:13px">Loading...</div></div></div><script>
var S={view:'radar',radar:[],signals:[],plays:[],gateReport:{},lastR:null,stQuery:'',stResult:null,stRaw:'',stLoading:false,fw:'verify',role:'entrepreneur',groqKey:localStorage.getItem('radar-groq-key')||''};

function exJSON(text){var bt=String.fromCharCode(96);var c=text.replace(new RegExp(bt+'+json\\s*','gi'),'').replace(new RegExp(bt+'+\\s*','g'),'').trim();try{return JSON.parse(c);}catch(e){}var d=0,s=-1;for(var i=0;i<c.length;i++){if(c[i]==='['||c[i]==='{'){if(d===0)s=i;d++;}if(c[i]===']'||c[i]==='}'){d--;if(d===0&&s>=0){try{return JSON.parse(c.slice(s,i+1));}catch(e){s=-1;}}}}return null;}
function loadData(){
fetch('radar.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){if(d&&d.items){S.radar=d.items;S.lastR=d.lastRefresh;S.gateReport=d.gate_report||{};}draw();}).catch(function(){draw();});
fetch('signals.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){if(d&&d.items)S.signals=d.items;draw();}).catch(function(){draw();});
fetch('plays.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){if(d&&d.items)S.plays=d.items;draw();}).catch(function(){draw();});
}
var FW={
verify:{n:'Verify',p:'You are a VERIFICATION agent. Your job is to CHALLENGE, not support.\n\nReview the evidence chain below. For each claim, state whether it is:\n- SUPPORTED (by cited evidence)\n- ASSUMED (plausible but not evidenced)\n- UNKNOWN (no basis to judge)\n\nDo NOT generate optimistic analysis. Generate honest assessment.\n\nRespond ONLY JSON:\n{"title":"Verification: ...","subtitle":"...","summary":"Honest assessment of the thesis","sections":[{"heading":"Supported","content":"What the evidence actually shows"},{"heading":"Assumed","content":"What is being assumed without evidence"},{"heading":"Unknown","content":"What we cannot determine from available information"},{"heading":"Evidence Gaps","content":"What additional information would be needed"}],"verdict":"Honest conclusion - is this worth pursuing, monitoring, or discarding?"}'},
macro:{n:'PESTEL',p:'Conduct PESTEL analysis. Rate each FAVORABLE/NEUTRAL/UNFAVORABLE.\n\nIMPORTANT: State what is based on evidence from the signals vs what is general knowledge vs what is assumption.\n\nRespond ONLY JSON:\n{"title":"...","subtitle":"...","summary":"...","pestel":[{"name":"Political","rating":"FAVORABLE|NEUTRAL|UNFAVORABLE","detail":"..."},{"name":"Economic","rating":"...","detail":"..."},{"name":"Social","rating":"...","detail":"..."},{"name":"Technological","rating":"...","detail":"..."},{"name":"Environmental","rating":"...","detail":"..."},{"name":"Legal","rating":"...","detail":"..."}],"sections":[{"heading":"Evidence Gaps","content":"What we do not know"}],"verdict":"..."}'},
industry:{n:'Industry',p:'Conduct industry structure analysis (Porter Five Forces). For each force state the assessment qualitatively.\n\nState what is evidence-based vs assumed.\n\nRespond ONLY JSON:\n{"title":"...","subtitle":"...","summary":"...","forces":[{"name":"New Entrants","assessment":"high|moderate|low barrier","detail":"..."},{"name":"Buyer Power","assessment":"...","detail":"..."},{"name":"Supplier Power","assessment":"...","detail":"..."},{"name":"Substitutes","assessment":"...","detail":"..."},{"name":"Rivalry","assessment":"...","detail":"..."}],"sections":[{"heading":"Value Chain","content":"..."},{"heading":"Evidence Gaps","content":"..."}],"verdict":"..."}'},
threat:{n:'Threat & Risk',p:'Conduct threat and risk analysis.\n\nFor each risk: probability (High/Medium/Low), impact (Critical/High/Medium/Low), and specific mitigation.\n\nState what is evidence-based vs assumed.\n\nRespond ONLY JSON:\n{"title":"...","subtitle":"...","summary":"...","risks":[{"name":"...","probability":"High|Medium|Low","impact":"Critical|High|Medium|Low","basis":"evidence-based|assumed|speculative","mitigation":"..."}],"scenarios":[{"name":"...","likelihood":"...","detail":"..."}],"sections":[{"heading":"Evidence Gaps","content":"..."}],"verdict":"..."}'},
respond:{n:'Response',p:'Conduct strategic response analysis.\n\nClassify actions as Now/Next/Later/Never with honest feasibility.\n\nState what is evidence-based vs assumed.\n\nRespond ONLY JSON:\n{"title":"...","subtitle":"...","summary":"...","priorities":[{"action":"...","timing":"now|next|later","impact":"high|medium|low","feasibility":"high|medium|low","basis":"evidence-based|assumed","detail":"..."}],"sections":[{"heading":"No-Regret Moves","content":"..."},{"heading":"Evidence Gaps","content":"..."}],"verdict":"..."}'}
};
function runStudio(q){if(!q)return;if(!S.groqKey){S.stRaw='Tap the key icon to enter your Groq API key (free at groq.com).';S.stLoading=false;draw();return;}S.stLoading=true;S.stResult=null;S.stRaw='';S.stQuery=q;draw();
var intel=S.radar.slice(0,10).map(function(r){return'['+r.verification_status+'][T'+r.source_tier+'] '+r.title+': '+r.summary;}).join('\n');
var sigs=S.signals.slice(0,8).map(function(s){return'['+s.evidence_strength+']['+s.change_type+'] '+s.statement+'\n  Evidence: '+(s.evidence||[]).join(', ')+'\n  Invalidation: '+s.invalidation;}).join('\n');
var pls=S.plays.slice(0,6).map(function(p){return'['+p.action_posture+'] '+p.title+'\n  Assumptions: '+p.assumptions+'\n  Invalidation: '+p.invalidation;}).join('\n');
var fw=FW[S.fw]||FW.verify;
var fullP=fw.p+'\n\nINTELLIGENCE (with verification status):\n'+(intel||'None')+'\n\nSIGNALS (with evidence strength):\n'+(sigs||'None')+'\n\nPLAYS (with assumptions):\n'+(pls||'None')+'\n\nROLE: '+S.role+'\nQUERY: '+q;
fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+S.groqKey,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:fullP}],temperature:0.2,max_tokens:4000})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('API '+r.status+': '+t.slice(0,100));});return r.json();}).then(function(d){var text=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'';var p=exJSON(text);if(p&&p.title)S.stResult=p;else S.stRaw=text||'No response.';S.stLoading=false;draw();}).catch(function(e){S.stRaw='Error: '+e.message;S.stLoading=false;draw();});}
function rr(d){var h='';if(d.title)h+='<div style="font-size:18px;font-weight:600;margin-bottom:6px">'+d.title+'</div>';if(d.subtitle)h+='<div style="font-size:12px;color:#8B95A8;margin-bottom:16px">'+d.subtitle+'</div>';
if(d.summary)h+='<div style="background:#C9A22708;border:1px solid #C9A22720;border-radius:8px;padding:14px;margin-bottom:16px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">Assessment</div><div style="font-size:12px;line-height:1.7">'+d.summary+'</div></div>';
if(d.pestel&&d.pestel.length){var pc={Political:'#4A90D9',Economic:'#C9A227',Social:'#22D3EE',Technological:'#A78BFA',Environmental:'#10B981',Legal:'#F59E0B'};d.pestel.forEach(function(p){var c=pc[p.name]||'#C9A227';var rc=p.rating==='FAVORABLE'?'#10B981':p.rating==='UNFAVORABLE'?'#EF4444':'#C9A227';h+='<div style="background:'+c+'08;border-left:3px solid '+c+';padding:12px;margin-bottom:8px;border-radius:0 6px 6px 0"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:'+c+';text-transform:uppercase">'+p.name+'</span><span style="font-size:9px;font-weight:700;color:'+rc+';background:'+rc+'18;padding:2px 8px;border-radius:3px">'+p.rating+'</span></div><div style="font-size:11px;line-height:1.6">'+p.detail+'</div></div>';});}
if(d.forces&&d.forces.length){d.forces.forEach(function(f){h+='<div style="background:#151922;border:1px solid #222838;border-radius:6px;padding:10px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">'+f.name+'</span>'+bg(f.assessment||'','#C9A227')+'</div><div style="font-size:10px;color:#8B95A8;line-height:1.5">'+f.detail+'</div></div>';});}
if(d.risks&&d.risks.length){var rk={Critical:'#EF4444',High:'#F59E0B',Medium:'#C9A227',Low:'#10B981'};h+='<div style="background:#1A1F2B;border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid #222838"><div style="font-size:10px;font-weight:700;color:#EF4444;text-transform:uppercase;margin-bottom:10px">Risk Assessment</div>';d.risks.forEach(function(r){h+='<div style="padding:8px 0;border-bottom:1px solid #22283822"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">'+r.name+'</span><div><span style="font-size:9px;font-weight:700;color:'+(rk[r.probability]||'#C9A227')+';background:'+(rk[r.probability]||'#C9A227')+'18;padding:2px 6px;border-radius:3px;margin-right:4px">P:'+r.probability+'</span><span style="font-size:9px;font-weight:700;color:'+(rk[r.impact]||'#C9A227')+';background:'+(rk[r.impact]||'#C9A227')+'18;padding:2px 6px;border-radius:3px">I:'+r.impact+'</span>'+(r.basis?'<span style="font-size:8px;color:#5A6478;margin-left:4px">('+r.basis+')</span>':'')+'</div></div><div style="font-size:10px;color:#8B95A8;line-height:1.5">'+r.mitigation+'</div></div>';});h+='</div>';}
if(d.scenarios&&d.scenarios.length){var sc2=['#10B981','#C9A227','#EF4444'];d.scenarios.forEach(function(s,i){var c=sc2[i%3];h+='<div style="background:'+c+'08;border-left:3px solid '+c+';padding:12px;margin-bottom:8px;border-radius:0 6px 6px 0"><div style="font-size:12px;font-weight:600;color:'+c+';margin-bottom:4px">'+s.name+'</div><div style="font-size:10px;color:#8B95A8;line-height:1.5">'+s.detail+'</div></div>';});}
if(d.priorities&&d.priorities.length){var tc={now:'#EF4444',next:'#F59E0B',later:'#C9A227'};d.priorities.forEach(function(p){var c=tc[p.timing]||'#C9A227';h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #22283822"><span style="font-size:9px;font-weight:700;color:'+c+';background:'+c+'18;padding:3px 10px;border-radius:3px;min-width:40px;text-align:center;text-transform:uppercase;flex-shrink:0;margin-top:2px">'+p.timing+'</span><div style="flex:1;font-size:11px"><b>'+p.action+'</b>'+(p.basis?' <span style="font-size:8px;color:#5A6478">('+p.basis+')</span>':'')+'<div style="color:#8B95A8;margin-top:2px;font-size:10px">'+p.detail+'</div></div></div>';});}
if(d.sections){d.sections.forEach(function(s){var isGap=s.heading&&s.heading.toLowerCase().indexOf('gap')>=0;h+='<div style="margin-bottom:14px'+(isGap?';background:#F59E0B08;border:1px solid #F59E0B20;border-radius:6px;padding:12px':'')+'"><div style="font-size:10px;font-weight:700;color:'+(isGap?'#F59E0B':(s.color||'#4A90D9'))+';text-transform:uppercase;margin-bottom:6px">'+s.heading+'</div><div style="font-size:12px;line-height:1.7">'+s.content+'</div></div>';});}
if(d.verdict)h+='<div style="background:linear-gradient(135deg,#C9A22712,#C9A22706);border:1px solid #C9A22730;border-radius:8px;padding:16px;margin-top:14px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">Verdict</div><div style="font-size:13px;font-weight:500;color:#E2C15E;line-height:1.6">'+d.verdict+'</div></div>';
return h;}
function draw(){var app=document.getElementById('app');var oldH=document.getElementById('hdr-el');if(oldH)oldH.remove();var hdr=document.createElement('div');hdr.id='hdr-el';hdr.innerHTML='<div class="hdr"><div class="hdr-inner"><span style="font-weight:600;color:#C9A227;font-size:13px">&#9673; Radar v4</span><div style="display:flex;gap:1px"><button class="tab'+(S.view==='radar'?' on':'')+'" id="navR">Radar</button><button class="tab'+(S.view==='signals'?' on':'')+'" id="navS">Signals</button><button class="tab'+(S.view==='plays'?' on':'')+'" id="navP">Plays</button><button class="tab'+(S.view==='studio'?' on':'')+'" id="navSt">Studio</button></div><button class="btn btn-o" id="keyT" style="padding:3px 8px;font-size:10px">&#128273;</button></div></div>';document.body.insertBefore(hdr,app);
document.getElementById('navR').onclick=function(){S.view='radar';draw();};document.getElementById('navS').onclick=function(){S.view='signals';draw();};document.getElementById('navP').onclick=function(){S.view='plays';draw();};document.getElementById('navSt').onclick=function(){S.view='studio';draw();};document.getElementById('keyT').onclick=function(){var k=prompt('Groq API key (free at groq.com):',S.groqKey||'');if(k!==null){S.groqKey=k.trim();localStorage.setItem('radar-groq-key',S.groqKey);}};
var html='';

if(S.view===‘radar’){var h=hrsAgo(S.lastR);var conf=S.radar.filter(function(r){return r.verification_status===‘confirmed’;}).length;var rep=S.radar.filter(function(r){return r.verification_status===‘reported’;}).length;var alg=S.radar.filter(function(r){return r.verification_status===‘alleged’;}).length;
html+=’<h2 style="font-size:20px;font-weight:600;margin-bottom:2px">Radar: Intelligence</h2><p style="color:#8B95A8;font-size:11px;margin-bottom:12px">Newly observable. No forced quota. Source-filtered.’+(h!==null?’ Updated ‘+h+‘h ago.’:’’)+’</p>’;
html+=’<div class="card" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#10B981">’+conf+’</div><div style="font-size:9px;color:#8B95A8">Confirmed</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#C9A227">’+rep+’</div><div style="font-size:9px;color:#8B95A8">Reported</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#F59E0B">’+alg+’</div><div style="font-size:9px;color:#8B95A8">Alleged</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#8B95A8">’+S.radar.length+’</div><div style="font-size:9px;color:#8B95A8">Total</div></div></div>’;
if(!S.radar.length)html+=’<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;font-size:12px">No intelligence yet. Run the GitHub Actions workflow.</p></div>’;
S.radar.forEach(function(r,i){var vc=vfC[r.verification_status]||’#8B95A8’;html+=’<div class="card" style="cursor:pointer;border-left:3px solid '+vc+'" data-ridx="'+i+'"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">’+bg(r.verification_status||‘unknown’,vc)+bg(‘T’+(r.source_tier||’?’),r.source_tier===1?’#10B981’:r.source_tier===2?’#C9A227’:’#8B95A8’)+bg(r.category||’’,’#4A90D9’)+bg(r.geography||’’,’#5A6478’)+’</div><div style="font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4">’+r.title+’</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:6px">’+r.summary+’</div><div style="font-size:10px;color:#C9A227;line-height:1.4;margin-bottom:4px">’+r.why_it_matters+’</div>’;if(r.affected_domains){html+=’<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px">’;r.affected_domains.forEach(function(d2){html+=bg(d2,’#5A6478’);});html+=’</div>’;}html+=’<div style="font-size:9px;color:#5A6478">’+r.source+’ | ‘+r.time+’</div></div>’;});}

if(S.view===‘signals’){var str=S.signals.filter(function(s){return s.evidence_strength===‘strong’;}).length;var mod=S.signals.filter(function(s){return s.evidence_strength===‘moderate’;}).length;var wk=S.signals.filter(function(s){return s.evidence_strength===‘weak’;}).length;
html+=’<h2 style="font-size:20px;font-weight:600;margin-bottom:2px">Signals: What Changed</h2><p style="color:#8B95A8;font-size:11px;margin-bottom:12px">Validated changes. Evidence-gated. Each must cite 2+ intelligence items.</p>’;
html+=’<div class="warn">Signals are inferred changes, not headlines. Each requires evidence and states what would invalidate it.</div>’;
html+=’<div class="card" style="display:flex;gap:12px;justify-content:center"><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#10B981">’+str+’</div><div style="font-size:9px;color:#8B95A8">Strong</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#C9A227">’+mod+’</div><div style="font-size:9px;color:#8B95A8">Moderate</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#F59E0B">’+wk+’</div><div style="font-size:9px;color:#8B95A8">Weak</div></div></div>’;
if(!S.signals.length)html+=’<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;font-size:12px">No signals yet.</p></div>’;
S.signals.forEach(function(s,i){var ec=esC[s.evidence_strength]||’#8B95A8’;var cc=changeC[s.change_type]||’#8B95A8’;html+=’<div class="card" style="cursor:pointer;border-left:3px solid '+ec+'" data-sidx="'+i+'"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">’+bg(s.evidence_strength||’?’,ec)+bg(s.change_type||’?’,cc)+bg(s.time_horizon||’?’,s.time_horizon===‘now’?’#EF4444’:s.time_horizon===‘1-2yr’?’#F59E0B’:’#C9A227’)+’</div><div style="font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4">’+s.statement+’</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:8px"><b style="color:#5A6478">Mechanism:</b> ‘+s.mechanism+’</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div style="background:#10B98108;border-radius:6px;padding:8px"><div style="font-size:9px;font-weight:700;color:#10B981;text-transform:uppercase;margin-bottom:2px">Upside</div><div style="font-size:10px;line-height:1.4">’+s.upside+’</div></div><div style="background:#EF444408;border-radius:6px;padding:8px"><div style="font-size:9px;font-weight:700;color:#EF4444;text-transform:uppercase;margin-bottom:2px">Downside</div><div style="font-size:10px;line-height:1.4">’+s.downside+’</div></div></div><div style="font-size:10px;color:#5A6478;line-height:1.4;margin-bottom:6px"><b>1st order:</b> ‘+s.first_order+’<br><b>2nd order:</b> ‘+s.second_order+’</div>’;if(s.evidence&&s.evidence.length){html+=’<div style="font-size:9px;color:#5A6478;margin-bottom:6px"><b>Evidence (’+s.evidence.length+’ items):</b> ‘+s.evidence.join(’ | ‘)+’</div>’;}html+=’<div class="inval"><b>Invalidation:</b> ‘+s.invalidation+’</div></div>’;});}

if(S.view===‘plays’){var postureCounts={};S.plays.forEach(function(p){var ap=p.action_posture||‘Monitor’;postureCounts[ap]=(postureCounts[ap]||0)+1;});
html+=’<h2 style="font-size:20px;font-weight:600;margin-bottom:2px">Plays: Action Paths</h2><p style="color:#8B95A8;font-size:11px;margin-bottom:12px">Grounded in strong/moderate signals only. No fake market sizes. No fake scores.</p>’;
html+=’<div class="warn">Every play states its assumptions and what would kill it. No numeric scores or market sizes are generated.</div>’;
html+=’<div class="card" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">’;[‘Monitor’,‘Prepare’,‘Defend’,‘Build’,‘Invest’].forEach(function(p){var c=postureC[p];html+=’<div style="text-align:center;min-width:55px"><div style="font-size:18px;font-weight:700;color:'+c+'">’+(postureCounts[p]||0)+’</div><div style="font-size:9px;color:#8B95A8">’+p+’</div></div>’;});html+=’</div>’;
if(!S.plays.length)html+=’<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;font-size:12px">No plays yet (signals may not have met strength threshold).</p></div>’;
S.plays.forEach(function(p,i){var pc=postureC[p.action_posture]||’#8B95A8’;html+=’<div class="card" style="cursor:pointer;border-left:3px solid '+pc+'" data-pidx="'+i+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="display:flex;gap:4px;flex-wrap:wrap">’+bg(p.sector||’’,’#C9A227’)+bg(p.entry_mode||’’,’#4A90D9’)+bg(p.timing||’’,p.timing===‘enter now’?’#10B981’:’#F59E0B’)+’</div><span class="posture" style="background:'+pc+'18;color:'+pc+'">’+p.action_posture+’</span></div><div style="font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.4">’+p.title+’</div><div style="font-size:11px;color:#8B95A8;margin-bottom:6px"><b>Actor:</b> ‘+p.actor+’ | <b>Customer:</b> ‘+p.customer+’</div><div style="font-size:11px;color:#EAEDF3;line-height:1.5;margin-bottom:8px">’+p.action_path+’</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;color:#8B95A8;margin-bottom:8px"><div><b>Capabilities:</b> ‘+p.capabilities+’</div><div><b>Barriers:</b> ‘+p.barriers+’</div><div><b>Monetization:</b> ‘+p.monetization+’</div><div><b>Entry:</b> ‘+p.entry_mode+’</div></div><div class="assume"><b>Assumptions:</b> ‘+p.assumptions+’</div><div class="inval"><b>Invalidation:</b> ‘+p.invalidation+’</div></div>’;});}

if(S.view===‘studio’){html+=’<h2 style="font-size:20px;font-weight:600;margin-bottom:2px">Studio: Verification & Analysis</h2><p style="color:#8B95A8;font-size:11px;margin-bottom:10px">Challenge layer. States what is supported, assumed, and unknown.’+(S.groqKey?’ Connected.’:’ Tap key.’)+’</p>’;
html+=’<div class="warn">Studio is a VERIFICATION layer, not a generation layer. It challenges theses rather than supporting them. Every output states evidence gaps.</div>’;
html+=’<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">’;Object.keys(FW).forEach(function(k){html+=’<button class="btn btn-o'+(S.fw===k?' on':'')+'" id="fw_'+k+'" style="font-size:9px;padding:4px 8px">’+FW[k].n+’</button>’;});html+=’</div>’;
html+=’<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">’;[‘Verify: is the top signal real?’,‘Challenge: strongest play assumptions’,‘PESTEL: Saudi AI with evidence gaps’,‘Risks to Vision 2030 tech strategy’,‘What should we act on now vs later?’].forEach(function(q){html+=’<button class="btn btn-o" data-sq="'+q+'" style="font-size:8px;padding:3px 6px">’+q+’</button>’;});html+=’</div>’;
html+=’<div style="margin-bottom:8px"><select class="inp" id="roleSel" style="padding:4px 8px;font-size:11px;width:auto"><option value=“entrepreneur”’+(S.role===‘entrepreneur’?’ selected’:’’)+’>Entrepreneur</option><option value=“investor”’+(S.role===‘investor’?’ selected’:’’)+’>Investor</option><option value=“policymaker”’+(S.role===‘policymaker’?’ selected’:’’)+’>Policy Maker</option></select></div>’;
html+=’<div class="card"><textarea class="inp" id="studioIn" placeholder="Ask a strategic question - Studio will challenge, not confirm...">’+(S.stQuery||’’)+’</textarea><div style="margin-top:8px"><button class=“btn btn-g” id=“btnSt”’+(S.stLoading?’ disabled’:’’)+’>’+(S.stLoading?‘Analyzing…’:‘Run ‘+FW[S.fw].n+’ Analysis’)+’</button></div></div>’;
if(S.stLoading)html+=’<div class="card" style="text-align:center;padding:30px;color:#C9A227"><div class="spinner" style="margin:0 auto 12px"></div>Analyzing…</div>’;
if(S.stResult&&!S.stLoading)html+=’<div class="card" style="border-color:#C9A22730">’+rr(S.stResult)+’</div>’;
if(S.stRaw&&!S.stResult&&!S.stLoading)html+=’<div class="card"><div style="font-size:12px;line-height:1.7;white-space:pre-wrap">’+S.stRaw+’</div></div>’;}

app.innerHTML=html;
Object.keys(FW).forEach(function(k){var b=document.getElementById(‘fw_’+k);if(b)b.onclick=function(){S.fw=k;draw();};});
var rs=document.getElementById(‘roleSel’);if(rs)rs.onchange=function(){S.role=this.value;};
var sb=document.getElementById(‘btnSt’);if(sb)sb.onclick=function(){var inp=document.getElementById(‘studioIn’);if(inp&&inp.value)runStudio(inp.value);};
document.querySelectorAll(’[data-sq]’).forEach(function(el){el.onclick=function(){S.stQuery=el.dataset.sq;runStudio(el.dataset.sq);};});
document.querySelectorAll(’[data-ridx]’).forEach(function(el){el.onclick=function(){var r=S.radar[parseInt(el.dataset.ridx)];if(r){S.view=‘studio’;S.fw=‘verify’;S.stQuery=‘Verify this intelligence: “’+r.title+’” (’+r.verification_status+’, T’+r.source_tier+’). Is the strategic consequence real? What evidence is missing?’;draw();setTimeout(function(){runStudio(S.stQuery);},100);}};});
document.querySelectorAll(’[data-sidx]’).forEach(function(el){el.onclick=function(){var s=S.signals[parseInt(el.dataset.sidx)];if(s){S.view=‘studio’;S.fw=‘verify’;S.stQuery=‘Verify this signal: “’+s.statement+’” (evidence: ‘+(s.evidence||[]).join(’, ‘)+’, invalidation: ‘+s.invalidation+’). Is this change real or overstated?’;draw();setTimeout(function(){runStudio(S.stQuery);},100);}};});
document.querySelectorAll(’[data-pidx]’).forEach(function(el){el.onclick=function(){var p=S.plays[parseInt(el.dataset.pidx)];if(p){S.view=‘studio’;S.fw=‘verify’;S.stQuery=‘Challenge this play: “’+p.title+’” for ‘+p.actor+’. Assumptions: ‘+p.assumptions+’. What would invalidate it: ‘+p.invalidation+’. Is this worth pursuing?’;draw();setTimeout(function(){runStudio(S.stQuery);},100);}};});}
loadData();
</script></body></html>
