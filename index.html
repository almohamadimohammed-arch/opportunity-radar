function runStudio(q){if(!q)return;if(!S.groqKey){S.stRaw='Tap the key icon in the header to enter your Groq API key (free at groq.com).';S.stLoading=false;draw();return;}S.stLoading=true;S.stResult=null;S.stRaw='';S.stQuery=q;draw();var sig=S.signals.slice(0,15).map(function(s){return'['+s.scope+']['+s.impact+']['+( s.classification||'')+'] '+s.headline+' | Driver:'+(s.driver||'')+' | Effect:'+(s.likely_effect||'')+' | Horizon:'+(s.time_horizon||'')+' | Action:'+(s.recommended_action||'')+'\n  '+(s.context||'');}).join('\n');var opp=S.opps.slice(0,6).map(function(o){return(o.title||'')+' | Score:'+(o.score||'')+' | '+(o.marketSize||'')+' | Entry:'+(o.entryMode||'')+' | Timing:'+(o.timing||'');}).join('\n');var fw=FRAMEWORKS[S.fw]||FRAMEWORKS.macro;var fullPrompt=fw.prompt+'\n\nCLASSIFIED SIGNALS:\n'+(sig||'None available')+'\nSCORED OPPORTUNITIES:\n'+(opp||'None available')+'\nROLE: '+S.role+'\nQUERY: '+q;fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+S.groqKey,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:fullPrompt}],temperature:0.3,max_tokens:4000})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('API '+r.status+': '+t.slice(0,100));});return r.json();}).then(function(d){var text=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'';var p=exJSON(text);if(p&&p.title)S.stResult=p;else S.stRaw=text||'No response.';S.stLoading=false;draw();}).catch(function(e){S.stRaw='Error: '+e.message;S.stLoading=false;draw();});}
