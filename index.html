// ─── STORAGE HELPERS ───
async function loadData(key) {
try {
const r = (() => { const v = localStorage.getItem(key); return v ? { value: v } : null; })();
return r ? JSON.parse(r.value) : null;
} catch { return null; }
}
async function saveData(key, data) {
try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) { console.error(“Storage save failed:”, e); }
}

function extractJSON(text) {
let cleaned = text.replace(/`json\s*/gi,"").replace(/`\s*/g,””).trim();
try { return JSON.parse(cleaned); } catch(e) {}
let depth=0,start=-1;
for(let i=0;i<cleaned.length;i++){
if(cleaned[i]===’{’){if(depth===0)start=i;depth++;}
if(cleaned[i]===’}’){depth–;if(depth===0&&start!==-1){try{return JSON.parse(cleaned.slice(start,i+1));}catch(e){start=-1;}}}
}
// Try array
depth=0;start=-1;
for(let i=0;i<cleaned.length;i++){
if(cleaned[i]===’[’){if(depth===0)start=i;depth++;}
if(cleaned[i]===’]’){depth–;if(depth===0&&start!==-1){try{return JSON.parse(cleaned.slice(start,i+1));}catch(e){start=-1;}}}
}
return null;
}

function purgeOld(items) {
const cutoff = Date.now() - RETENTION_DAYS * 86400000;
return items.filter(i => new Date(i._fetchedAt || i.date).getTime() > cutoff);
}

// ─── API CALL HELPER ───
async function callAgent(messages, useSearch = true, apiKey = null) {
const body = {
model: “claude-sonnet-4-20250514”,
max_tokens: 4096,
messages,
};
if (useSearch) body.tools = [{ type: “web_search_20250305”, name: “web_search” }];

const headers = { “Content-Type”: “application/json” };
// When running on GitHub Pages (or any external host), use the user’s API key
if (apiKey) {
headers[“x-api-key”] = apiKey;
headers[“anthropic-version”] = “2023-06-01”;
headers[“anthropic-dangerous-direct-browser-access”] = “true”;
}

const resp = await fetch(“https://api.anthropic.com/v1/messages”, {
method: “POST”,
headers,
body: JSON.stringify(body),
});
if (!resp.ok) {
const errBody = await resp.text().catch(() => “”);
if (resp.status === 401) throw new Error(“Invalid API key. Check your key in Settings.”);
if (resp.status === 403) throw new Error(“API key lacks permission. Use a key with Messages API access.”);
if (resp.status === 429) throw new Error(“Rate limited. Wait a moment and try again.”);
throw new Error(`API error ${resp.status}: ${errBody.slice(0, 100)}`);
}
const data = await resp.json();
return (data.content || []).filter(b => b.type === “text”).map(b => b.text).join(”\n”);
}

            </button>
          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 10, color: C.dim, flexWrap: "wrap" }}>
            <span>📊 {analysisType}</span>
            <span>👤 {role}</span>
            <span>📡 {signals.length} live signals</span>
            <span>◆ {opportunities.length} opportunities</span>
          </div>
        </div>

        {studioLoading && <div className="card" style={{ padding: 40, textAlign: "center" }}><div style={{ color: C.gold, fontSize: 14, fontWeight: 500 }} className="loading">AI Agent analyzing...</div></div>}
        {studioResult && !studioLoading && <div className="card fi" style={{ padding: 24 }}><div style={{ display: "flex", gap: 6, marginBottom: 16, paddingBottom: 12, borderBottom: `1px solid ${C.border}` }}><Badge color={C.gold}>{analysisType}</Badge><Badge color={C.green}>{role}</Badge><Badge color={C.purple}>live data</Badge></div><AnalysisRenderer data={studioResult} /></div>}
        {studioRaw && !studioResult && !studioLoading && <div className="card fi" style={{ padding: 24 }}><div style={{ fontSize: 13, lineHeight: 1.85, whiteSpace: "pre-wrap" }}>{studioRaw}</div></div>}
      </div>
    )}
  </main>
