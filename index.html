<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Opportunity Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0C10;--bg2:#10131A;--sf:#151922;--sa:#1A1F2B;--bd:#222838;--bh:#2E3548;--gold:#C9A227;--gl:#E2C15E;--gd:#7A6318;--blue:#4A90D9;--cyan:#22D3EE;--green:#10B981;--red:#EF4444;--orange:#F59E0B;--purple:#A78BFA;--tx:#EAEDF3;--mu:#8B95A8;--dm:#5A6478}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bh);border-radius:3px}
::selection{background:#C9A22730}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fadeIn .4s ease both}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px}
.badge{display:inline-flex;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:5px;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:.15s}
.btn-g{background:var(--gold);color:var(--bg)}.btn-g:hover{background:var(--gl)}.btn-g:disabled{opacity:.5}
.btn-o{background:transparent;color:var(--mu);border:1px solid var(--bd)}.btn-o:hover{color:var(--tx);border-color:var(--bh)}
.btn-o.on{color:var(--gold);border-color:#C9A22744;background:#C9A2270a}
.inp{background:var(--sa);border:1px solid var(--bd);border-radius:5px;padding:8px 12px;color:var(--tx);font-size:13px;font-family:'Outfit',sans-serif;outline:none;width:100%}
.inp:focus{border-color:#C9A22755}.inp::placeholder{color:var(--dm)}
textarea.inp{resize:vertical;min-height:56px;line-height:1.6}
.ld{animation:pulse 1.5s infinite}
header{background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hdr{display:flex;align-items:center;justify-content:space-between;height:52px;max-width:1300px;margin:0 auto;padding:0 16px}
.nav-btn{padding:6px 12px;font-size:11px;font-weight:500;font-family:'Outfit',sans-serif;color:var(--dm);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.nav-btn.on{color:var(--gold);border-bottom-color:var(--gold);background:#C9A2270c}
main{max-width:1300px;margin:0 auto;padding:16px 16px 60px}
.empty{padding:36px;text-align:center}
.progress{padding:8px 12px;margin-bottom:12px;font-size:11px;background:var(--sa);border-radius:6px}
.stat-grid{display:grid;gap:10px;margin-bottom:20px}
.stat-card{border-radius:8px;padding:16px 14px;text-align:center}
.stat-val{font-family:'Crimson Pro',serif;font-size:26px;font-weight:700;line-height:1.1;margin-bottom:6px}
.stat-lbl{font-size:10px;color:var(--mu);line-height:1.4}
.pestel-dim{border-radius:0 6px 6px 0;padding:12px 14px;margin-bottom:8px}
.risk-row{padding:10px 0;border-bottom:1px solid #22283822}
.verdict-box{border-radius:8px;padding:18px;margin-top:20px;background:linear-gradient(135deg,#C9A22712,#C9A22706);border:1px solid #C9A22730}
.sig-card{padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.sig-card:hover{border-color:var(--bh)}
.key-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── STATE ───
let state={view:'signals',role:'entrepreneur',scope:'all',apiKey:localStorage.getItem('radar-api-key')||'',signals:[],opportunities:[],lastSig:null,lastOpp:null,sigLoading:false,oppLoading:false,sigMsg:'',oppMsg:'',stQuery:'',stResult:null,stRaw:'',stLoading:false,framework:'strategic',showKey:false};

function loadStored(){
try{const s=JSON.parse(localStorage.getItem(‘radar-signals’));if(s){state.signals=purge(s.items||[]);state.lastSig=s.lastRefresh;}}catch{}
try{const o=JSON.parse(localStorage.getItem(‘radar-opportunities’));if(o){state.opportunities=purge(o.items||[]);state.lastOpp=o.lastRefresh;}}catch{}
}
function purge(arr){const cut=Date.now()-30*864e5;return arr.filter(i=>new Date(i._at||i.date).getTime()>cut);}
function badge(text,color){return`<span class="badge" style="background:${color}14;color:${color};border:1px solid ${color}28">${text}</span>`;}
function hAgo(ts){return ts?Math.round((Date.now()-new Date(ts).getTime())/36e5):null;}
function stale(ts){return !ts||hAgo(ts)>=24;}

// ─── API ───
async function callAPI(msgs,search=true){
const b={model:‘claude-sonnet-4-20250514’,max_tokens:4096,messages:msgs};
if(search)b.tools=[{type:‘web_search_20250305’,name:‘web_search’}];
const r=await fetch(‘https://api.anthropic.com/v1/messages’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’,‘x-api-key’:state.apiKey,‘anthropic-version’:‘2023-06-01’,‘anthropic-dangerous-direct-browser-access’:‘true’},body:JSON.stringify(b)});
if(!r.ok)throw new Error(‘API ‘+r.status);
const d=await r.json();
return(d.content||[]).filter(b=>b.type===‘text’).map(b=>b.text).join(’\n’);
}
function extractJSON(t){
let c=t.replace(/`json\s*/gi,'').replace(/`\s*/g,’’).trim();
try{return JSON.parse(c)}catch{}
let d=0,s=-1;for(let i=0;i<c.length;i++){if(c[i]===’{’){if(!d)s=i;d++}if(c[i]===’}’){d–;if(!d&&s>=0){try{return JSON.parse(c.slice(s,i+1))}catch{s=-1}}}}
d=0;s=-1;for(let i=0;i<c.length;i++){if(c[i]===’[’){if(!d)s=i;d++}if(c[i]===’]’){d–;if(!d&&s>=0){try{return JSON.parse(c.slice(s,i+1))}catch{s=-1}}}}
return null;
}

// ─── SIGNAL FETCH ───
async function fetchSignals(){
state.sigLoading=true;state.sigMsg=‘Searching latest news…’;render();
try{
const text=await callAPI([{role:‘user’,content:`You are a Signal Detection Engine for Saudi Arabia Vision 2030. TODAY: ${new Date().toISOString().split(‘T’)[0]}

Search the web for REAL current news. Generate exactly 10 Saudi local signals and 8 global signals.

LOCAL TYPES: regulations, investment incentives, demographic shifts, tech milestones, tenders, mega-project updates, sector strategies, economic indicators
GLOBAL TYPES: geopolitical events affecting Gulf, tech disruptions, trade policy, energy shifts, global economics, peer benchmarks

Every signal must be REAL. Respond ONLY with JSON array:
[{“scope”:“local|global”,“headline”:”…”,“sector”:”…”,“region”:”…”,“date”:“YYYY-MM-DD”,“impact”:“critical|high|medium”,“source”:”…”,“type”:”…”,“context”:“2-3 sentences”}]`}],true); const p=extractJSON(text); if(Array.isArray(p)&&p.length){ const stamped=p.map(s=>({...s,_at:new Date().toISOString(),_id:Math.random().toString(36).slice(2,9)})); const ex=purge(state.signals);const hs=new Set(ex.map(s=>s.headline)); const fresh=stamped.filter(s=>!hs.has(s.headline)); state.signals=[...fresh,...ex];state.lastSig=new Date().toISOString(); localStorage.setItem('radar-signals',JSON.stringify({items:state.signals,lastRefresh:state.lastSig})); state.sigMsg=`✅ ${fresh.length} new signals. ${state.signals.length} total.`;
}else state.sigMsg=‘⚠ Could not parse. Try again.’;
}catch(e){state.sigMsg=’❌ ’+e.message;}
state.sigLoading=false;render();
}

// ─── OPPORTUNITY GENERATION ───
async function generateOpps(){
if(!state.signals.length){state.oppMsg=‘⚠ Load signals first.’;render();return;}
state.oppLoading=true;state.oppMsg=‘Synthesizing from signals…’;render();
const ctx=state.signals.slice(0,20).map(s=>`[${s.scope}][${s.impact}] ${s.headline} | ${s.sector}: ${s.context}`).join(’\n’);
try{
const text=await callAPI([{role:‘user’,content:`Analyze these signals. Generate 5-8 scored Saudi business opportunities.

SIGNALS:\n${ctx}

Each links to 2+ signals. Score 0-100 on: V2030 Alignment, Regulatory Support, Market Attractiveness, Ease of Entry, Low Competition, Investment vs Return.

Respond ONLY JSON array:
[{“title”:”…”,“sector”:”…”,“region”:”…”,“score”:85,“urgency”:“Emerging|Growing”,“marketSize”:”$X.XB”,“growth”:”+XX%”,“description”:”…”,“customers”:”…”,“competition”:”…”,“capabilities”:”…”,“risks”:”…”,“investment”:”$X-XM”,“returnEst”:“Xx/Xyr”,“linkedSignals”:[”…”],“scores”:{“v2030”:90,“regulatory”:85,“market”:88,“ease”:70,“competition”:75,“investReturn”:80}}]`}],false); const p=extractJSON(text); if(Array.isArray(p)&&p.length){ const stamped=p.map(o=>({...o,_at:new Date().toISOString(),_id:Math.random().toString(36).slice(2,9)})); const ex=purge(state.opportunities);const ts=new Set(ex.map(o=>o.title)); const fresh=stamped.filter(o=>!ts.has(o.title)); state.opportunities=[...fresh,...ex].sort((a,b)=>(b.score||0)-(a.score||0)); state.lastOpp=new Date().toISOString(); localStorage.setItem('radar-opportunities',JSON.stringify({items:state.opportunities,lastRefresh:state.lastOpp})); state.oppMsg=`✅ ${fresh.length} new opportunities. ${state.opportunities.length} total.`;
}else state.oppMsg=‘⚠ Could not parse.’;
}catch(e){state.oppMsg=’❌ ’+e.message;}
state.oppLoading=false;render();
}

// ─── AI STUDIO ───
async function runStudio(q){
if(!q?.trim())return;
state.stLoading=true;state.stResult=null;state.stRaw=’’;state.stQuery=q;render();
const fw=state.framework;const ro=state.role===‘entrepreneur’?‘an entrepreneur/SME owner’:state.role===‘investor’?‘a VC/angel investor’:‘a policy maker’;
const sig=state.signals.slice(0,18).map(s=>`[${s.scope}][${s.impact}] ${s.headline}: ${s.context}`).join(’\n’);
const opp=state.opportunities.slice(0,8).map(o=>`${o.title} | Score:${o.score} | ${o.marketSize}: ${o.description}`).join(’\n’);
const schema=fw===‘pestel’?‘Include “pestel”:[{“name”:“Political|Economic|Social|Technological|Environmental|Legal”,“rating”:“FAVORABLE|NEUTRAL|UNFAVORABLE”,“detail”:”…”}]’:’’;
const riskSchema=fw===‘risk’?‘Include “risks”:[{“name”:”…”,“probability”:“High|Medium|Low”,“impact”:“Critical|High|Medium|Low”,“mitigation”:”…”}]’:’’;
try{
const text=await callAPI([{role:‘user’,content:`AI Decision Engine for Saudi Vision 2030. Respond ONLY JSON:
{“title”:”…”,“subtitle”:”…”,“metrics”:[{“value”:”…”,“label”:”…”,“icon”:”…”}],“summary”:”…”,“sections”:[{“heading”:”…”,“content”:”…”}],“verdict”:”…”${schema?’,’+schema:’’}${riskSchema?’,’+riskSchema:’’}}

SIGNALS:\n${sig||‘None yet’}\nOPPORTUNITIES:\n${opp||‘None yet’}\nFRAMEWORK:${fw} ROLE:${ro}\nQUERY:${q}\n\n3-4 metrics, 2-4 sections, bold verdict. Specific to Saudi Arabia.`}],true);
const p=extractJSON(text);
if(p?.title)state.stResult=p;else state.stRaw=text;
}catch(e){state.stRaw=’Error: ’+e.message;}
state.stLoading=false;render();
}

// ─── RENDER ───
function render(){
const app=document.getElementById(‘app’);
if(!state.apiKey){app.innerHTML=renderKeyScreen();return;}
app.innerHTML=renderHeader()+’<main>’+
(state.view===‘signals’?renderSignals():state.view===‘opportunities’?renderOpps():renderStudio())
+’</main>’;
bindEvents();
}

function renderKeyScreen(){
return`<div class="key-screen"><div class="card" style="padding:32px;max-width:420px;width:100%;text-align:center">
<div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gd));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--bg);margin:0 auto 16px">◉</div>
<div style="font-family:'Crimson Pro',serif;font-size:24px;font-weight:600;color:var(--gold);margin-bottom:4px">Opportunity Radar</div>
<div style="font-size:12px;color:var(--mu);margin-bottom:24px">AI-powered Vision 2030 intelligence</div>
<div style="font-size:13px;margin-bottom:16px;text-align:left;line-height:1.6">Enter your Anthropic API key. Stored <strong>only in your browser</strong>.</div>
<input class="inp" id="keyIn" type="password" placeholder="sk-ant-api03-..." style="margin-bottom:12px;padding:12px 14px;font-size:14px">
<button class="btn btn-g" id="keyBtn" style="width:100%;padding:12px;font-size:14px;justify-content:center">🔐 Save & Launch</button>
<div style="font-size:10px;color:var(--dm);margin-top:12px">Get key at console.anthropic.com</div>

  </div></div>`;
}

function renderHeader(){
const tabs=[{id:‘signals’,l:‘◈ Signals’},{id:‘opportunities’,l:‘◆ Opps’},{id:‘studio’,l:‘⚡ AI Studio’}];
return`<header><div class="hdr"> <div style="display:flex;align-items:center;gap:8px"> <div style="width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--gd));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg)">◉</div> <span style="font-family:'Crimson Pro',serif;font-weight:600;font-size:15px;color:var(--gold)">Opportunity Radar</span> </div> <div style="display:flex">${tabs.map(t=>`<button class="nav-btn ${state.view===t.id?'on':''}" data-nav="${t.id}">${t.l}</button>`).join(’’)}</div>
<div style="display:flex;gap:6px;align-items:center">
<select class="inp" id="roleSelect" style="padding:3px 6px;font-size:10px;width:auto">
<option value=“entrepreneur” ${state.role===‘entrepreneur’?‘selected’:’’}>🏗 Entrep.</option>
<option value=“investor” ${state.role===‘investor’?‘selected’:’’}>📊 Investor</option>
<option value=“policymaker” ${state.role===‘policymaker’?‘selected’:’’}>🏛 Policy</option>
</select>
<button class="btn btn-o" id="keyEditBtn" style="padding:3px 8px;font-size:10px">🔑</button>
</div>

  </div>${state.showKey?`<div style="background:var(--sa);border-bottom:1px solid var(--bd);padding:10px 16px"><div style="max-width:1300px;margin:0 auto;display:flex;gap:10px;align-items:center"><span style="font-size:11px;color:var(--dm)">API Key:</span><input class="inp" id="keyEdit" type="password" value="${state.apiKey}" style="flex:1;padding:6px 10px;font-size:12px"><span style="font-size:10px;color:var(--green)">✓ Browser only</span></div></div>`:''}</header>`;
}

function renderSignals(){
const sigs=state.signals.filter(s=>{if(state.scope===‘local’&&s.scope!==‘local’)return false;if(state.scope===‘global’&&s.scope!==‘global’)return false;return true;});
const local=state.signals.filter(s=>s.scope===‘local’).length;
const global=state.signals.filter(s=>s.scope===‘global’).length;
const h=hAgo(state.lastSig);
let html=`<div class="fi"> <h1 style="font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;margin-bottom:4px">Signal Detection Engine</h1> <p style="color:var(--mu);font-size:12px;margin-bottom:14px">AI-powered from live news. Tap any signal to analyze.</p> <div class="card" style="padding:12px;margin-bottom:14px"> <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"> <div style="display:flex;gap:10px;font-size:11px;color:var(--mu);align-items:center;flex-wrap:wrap"> <span>📡 <b style="color:var(--tx)">${state.signals.length}</b></span> <span>🇸🇦 <b style="color:var(--cyan)">${local}</b></span> <span>🌐 <b style="color:var(--purple)">${global}</b></span> ${h!==null?`<span style="color:${stale(state.lastSig)?'var(--orange)':'var(--green)'}">${h}h ago</span>`:''} ${stale(state.lastSig)?badge('refresh needed','#F59E0B'):''} </div> <button class="btn btn-g" id="refreshSig" ${state.sigLoading?'disabled':''} style="font-size:11px;padding:6px 14px">${state.sigLoading?'⏳ Scanning...':'🔄 Refresh Signals'}</button> </div> </div>`;
if(state.sigMsg)html+=`<div class="progress" style="color:${state.sigMsg[0]==='✅'?'var(--green)':state.sigMsg[0]==='❌'?'var(--red)':'var(--gold)'}">${state.sigLoading?'<span class="ld">⏳</span> ':''}${state.sigMsg}</div>`;
html+=`<div style="display:flex;gap:6px;margin-bottom:14px;align-items:center"> ${['all','local','global'].map(s=>`<button class="btn btn-o ${state.scope===s?'on':''}" data-scope="${s}" style="font-size:11px;padding:5px 10px">${s===‘all’?‘All’:s===‘local’?‘🇸🇦 Local’:‘🌐 Global’}</button>`).join(’’)}
${badge(sigs.length,’#4A90D9’)}

  </div>`;
  if(!state.signals.length&&!state.sigLoading){
    html+=`<div class="card empty"><div style="font-size:28px;margin-bottom:10px">◈</div><div style="font-size:14px;font-weight:600;margin-bottom:8px">No signals yet</div><div style="font-size:12px;color:var(--mu);margin-bottom:14px">Tap "Refresh Signals" to scan live sources for 18 signals.</div><button class="btn btn-g" id="refreshSig2">🔄 Refresh Signals</button></div>`;
  }
  sigs.forEach((s,i)=>{
    html+=`<div class="card sig-card fi" data-sig="${i}" style="animation-delay:${i*.03}s">
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
        ${badge(s.scope,s.scope==='global'?'#A78BFA':'#22D3EE')}
        ${badge(s.impact,s.impact==='critical'?'#EF4444':s.impact==='high'?'#F59E0B':'#C9A227')}
        ${badge(s.sector,'#4A90D9')}
        ${s.type?badge(s.type,'#8B95A8'):''}
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4">${s.headline}</div>
      <div style="font-size:11px;color:var(--mu);line-height:1.5;margin-bottom:4px">${s.context||''}</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dm)">
        <span>${s.source||''} · ${s.date||''}</span>
        <span style="color:var(--gold);font-weight:600">⚡ Analyze →</span>
      </div>
    </div>`;
  });
  return html+'</div>';
}

function renderOpps(){
const opps=state.opportunities;
let html=`<div class="fi"> <h1 style="font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;margin-bottom:4px">Opportunity Explorer</h1> <p style="color:var(--mu);font-size:12px;margin-bottom:14px">AI-scored from signal clusters. Tap to analyze.</p> <div class="card" style="padding:12px;margin-bottom:14px"> <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"> <div style="display:flex;gap:10px;font-size:11px;color:var(--mu);flex-wrap:wrap"> <span>◆ <b style="color:var(--tx)">${opps.length}</b></span> <span>from <b>${state.signals.length}</b> signals</span> </div> <button class="btn btn-g" id="genOpp" ${state.oppLoading||!state.signals.length?'disabled':''} style="font-size:11px;padding:6px 14px">${state.oppLoading?'⏳ Generating...':'🔄 Generate'}</button> </div> </div>`;
if(state.oppMsg)html+=`<div class="progress" style="color:${state.oppMsg[0]==='✅'?'var(--green)':state.oppMsg[0]==='❌'?'var(--red)':'var(--gold)'}">${state.oppLoading?'<span class="ld">⏳</span> ':''}${state.oppMsg}</div>`;
if(!opps.length&&!state.oppLoading){
html+=`<div class="card empty"><div style="font-size:28px;margin-bottom:10px">◆</div><div style="font-size:14px;font-weight:600;margin-bottom:8px">No opportunities yet</div><div style="font-size:12px;color:var(--mu);margin-bottom:14px">${!state.signals.length?'Load signals first.':state.signals.length+' signals ready. Tap to generate.'}</div><button class="btn btn-g" id="${state.signals.length?'genOpp2':'refreshSig3'}">${state.signals.length?'🔄 Generate':'🔄 Load Signals First'}</button></div>`;
}
opps.forEach((o,i)=>{
const sc=o.score||75;const col=sc>=90?‘var(–green)’:sc>=80?‘var(–gold)’:sc>=70?‘var(–orange)’:‘var(–red)’;
const scores=o.scores||{};
html+=`<div class="card fi" data-opp="${i}" style="padding:16px;margin-bottom:10px;cursor:pointer;animation-delay:${i*.04}s"> <div style="display:flex;gap:14px"> <div style="width:52px;height:52px;border-radius:50%;border:3px solid ${col};display:flex;align-items:center;justify-content:center;font-family:'Crimson Pro',serif;font-size:18px;font-weight:700;color:${col};flex-shrink:0">${sc}</div> <div style="flex:1"> <div style="display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap">${badge(o.sector,'#C9A227')} ${o.region?badge(o.region,'#10B981'):''} ${o.urgency?badge(o.urgency,o.urgency==='Critical'?'#EF4444':'#22D3EE'):''}</div> <div style="font-size:15px;font-weight:600;font-family:'Crimson Pro',serif;margin-bottom:4px">${o.title}</div> <p style="font-size:11px;color:var(--mu);line-height:1.5;margin-bottom:8px">${o.description||''}</p> <div style="display:flex;gap:14px;font-size:11px;flex-wrap:wrap"> ${o.marketSize?`<span><span style="color:var(--dm)">Market</span> <b style="color:var(--gold)">${o.marketSize}</b></span>`:''} ${o.growth?`<span><span style="color:var(--dm)">Growth</span> <b style="color:var(--green)">${o.growth}</b></span>`:''} ${o.investment?`<span><span style="color:var(--dm)">Invest</span> <b>${o.investment}</b></span>`:''} </div> </div> </div> </div>`;
});
return html+’</div>’;
}

function renderStudio(){
const fws=[{id:‘strategic’,l:‘🔬 Strategic’},{id:‘pestel’,l:‘🌍 PESTEL’},{id:‘risk’,l:‘⚠️ Risk’},{id:‘competitive’,l:‘🏁 Competitive’}];
const qs=[“Strongest opportunity clusters”,“PESTEL: Saudi AI sector”,“Risk: Red Sea logistics”,“Top sectors by momentum”,“Compare top 3 opportunities”];
let html=`<div class="fi"> <h1 style="font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;margin-bottom:4px">AI Decision Studio</h1> <p style="color:var(--mu);font-size:12px;margin-bottom:14px">${state.signals.length} signals · ${state.opportunities.length} opportunities loaded</p> <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center"> <span style="font-size:11px;color:var(--dm)">Framework:</span> ${fws.map(f=>`<button class="btn btn-o ${state.framework===f.id?'on':''}" data-fw="${f.id}" style="font-size:10px;padding:4px 10px">${f.l}</button>`).join('')} </div> <div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap"> ${qs.map(q=>`<button class="btn btn-o" data-sq="${q}" style="font-size:9px;padding:3px 8px">${q}</button>`).join('')} </div> <div class="card" style="padding:14px;margin-bottom:14px"> <div style="display:flex;gap:8px"> <textarea class="inp" id="studioInput" placeholder="Ask about signals, opportunities, risks...">${state.stQuery}</textarea> <button class="btn btn-g" id="runStudio" ${state.stLoading?'disabled':''} style="align-self:flex-end;padding:10px 18px;font-size:13px">${state.stLoading?'⏳':'⚡'}</button> </div> </div>`;
if(state.stLoading)html+=`<div class="card" style="padding:36px;text-align:center"><div style="color:var(--gold);font-size:13px" class="ld">AI Agent analyzing...</div></div>`;
if(state.stResult&&!state.stLoading)html+=renderInfographic(state.stResult);
if(state.stRaw&&!state.stResult&&!state.stLoading)html+=`<div class="card fi" style="padding:20px"><div style="font-size:12px;line-height:1.8;white-space:pre-wrap">${state.stRaw}</div></div>`;
return html+’</div>’;
}

function renderInfographic(d){
let h=`<div class="card fi" style="padding:20px"> <div style="display:flex;gap:6px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd)">${badge(state.framework,'#C9A227')} ${badge(state.role,'#10B981')} ${badge('live','#A78BFA')}</div>`;
if(d.title)h+=`<div style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bd)"><div style="font-family:'Crimson Pro',serif;font-size:22px;font-weight:600;margin-bottom:6px;line-height:1.3">${d.title}</div>${d.subtitle?`<div style="font-size:13px;color:var(--mu);line-height:1.5">${d.subtitle}</div>`:''}</div>`;
if(d.metrics?.length){
h+=`<div class="stat-grid" style="grid-template-columns:repeat(${Math.min(d.metrics.length,4)},1fr)">`;
const cols=[’#C9A227’,’#10B981’,’#4A90D9’,’#22D3EE’,’#A78BFA’];
d.metrics.forEach((m,i)=>{const c=m.color||cols[i%5];h+=`<div class="stat-card" style="background:${c}10;border:1px solid ${c}30">${m.icon?`<div style="font-size:18px;margin-bottom:6px;opacity:.7">${m.icon}</div>`:''}<div class="stat-val" style="color:${c}">${m.value}</div><div class="stat-lbl">${m.label}</div></div>`;});
h+=’</div>’;
}
if(d.summary)h+=`<div style="background:#C9A22708;border:1px solid #C9A22720;border-radius:8px;padding:16px;margin-bottom:20px"><div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Executive Summary</div><div style="font-size:13px;line-height:1.7">${d.summary}</div></div>`;
const pc={Political:’#4A90D9’,Economic:’#C9A227’,Social:’#22D3EE’,Technological:’#A78BFA’,Environmental:’#10B981’,Legal:’#F59E0B’};
if(d.pestel?.length){
h+=`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">PESTEL Analysis</div>`;
d.pestel.forEach(p=>{const c=pc[p.name]||’#C9A227’;const rc=p.rating===‘FAVORABLE’?’#10B981’:p.rating===‘UNFAVORABLE’?’#EF4444’:’#C9A227’;
h+=`<div class="pestel-dim" style="background:${c}08;border-left:3px solid ${c}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:${c};text-transform:uppercase;letter-spacing:.05em">${p.name}</span><span style="font-size:10px;font-weight:700;color:${rc};background:${rc}18;padding:2px 8px;border-radius:3px">${p.rating}</span></div><div style="font-size:12px;line-height:1.6">${p.detail}</div></div>`;
});h+=’</div>’;
}
if(d.risks?.length){
h+=`<div style="background:var(--sa);border-radius:8px;padding:16px;margin-bottom:20px;border:1px solid var(--bd)"><div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">⚠ Risk Assessment</div>`;
d.risks.forEach(r=>{const rk={Critical:’#EF4444’,High:’#F59E0B’,Medium:’#C9A227’,Low:’#10B981’};const prc=rk[r.probability]||’#C9A227’;const irc=rk[r.impact]||’#C9A227’;
h+=`<div class="risk-row"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${r.name}</span><div style="display:flex;gap:6px"><span style="font-size:9px;font-weight:700;color:${prc};background:${prc}18;padding:2px 7px;border-radius:3px">P:${r.probability}</span><span style="font-size:9px;font-weight:700;color:${irc};background:${irc}18;padding:2px 7px;border-radius:3px">I:${r.impact}</span></div></div><div style="font-size:11px;color:var(--mu);line-height:1.5">${r.mitigation}</div></div>`;
});h+=’</div>’;
}
if(d.sections)d.sections.forEach(s=>{h+=`<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:${s.color||'#4A90D9'};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${s.heading}</div><div style="font-size:13px;line-height:1.75">${s.content}</div></div>`;});
if(d.verdict)h+=`<div class="verdict-box"><div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">◉ Strategic Verdict</div><div style="font-size:14px;font-weight:500;color:var(--gl);line-height:1.6">${d.verdict}</div></div>`;
return h+’</div>’;
}

// ─── EVENT BINDING ───
function bindEvents(){
document.querySelectorAll(’[data-nav]’).forEach(b=>b.onclick=()=>{state.view=b.dataset.nav;render();});
document.querySelectorAll(’[data-scope]’).forEach(b=>b.onclick=()=>{state.scope=b.dataset.scope;render();});
document.querySelectorAll(’[data-fw]’).forEach(b=>b.onclick=()=>{state.framework=b.dataset.fw;render();});
document.querySelectorAll(’[data-sq]’).forEach(b=>b.onclick=()=>{state.stQuery=b.dataset.sq;runStudio(b.dataset.sq);});
document.querySelectorAll(’[data-sig]’).forEach(b=>b.onclick=()=>{const s=state.signals.filter(s=>{if(state.scope===‘local’&&s.scope!==‘local’)return false;if(state.scope===‘global’&&s.scope!==‘global’)return false;return true;})[+b.dataset.sig];if(s){state.view=‘studio’;state.stQuery=`Analyze: "${s.headline}" — implications for Saudi Arabia.`;render();setTimeout(()=>runStudio(state.stQuery),100);}});
document.querySelectorAll(’[data-opp]’).forEach(b=>b.onclick=()=>{const o=state.opportunities[+b.dataset.opp];if(o){state.view=‘studio’;state.stQuery=`Deep analysis: "${o.title}" (Score:${o.score}, Market:${o.marketSize}).`;render();setTimeout(()=>runStudio(state.stQuery),100);}});
const rs=document.getElementById(‘refreshSig’);if(rs)rs.onclick=fetchSignals;
const rs2=document.getElementById(‘refreshSig2’);if(rs2)rs2.onclick=fetchSignals;
const rs3=document.getElementById(‘refreshSig3’);if(rs3)rs3.onclick=fetchSignals;
const go=document.getElementById(‘genOpp’);if(go)go.onclick=generateOpps;
const go2=document.getElementById(‘genOpp2’);if(go2)go2.onclick=generateOpps;
const ro=document.getElementById(‘roleSelect’);if(ro)ro.onchange=()=>{state.role=ro.value;};
const ke=document.getElementById(‘keyEditBtn’);if(ke)ke.onclick=()=>{state.showKey=!state.showKey;render();};
const ki=document.getElementById(‘keyEdit’);if(ki)ki.onblur=()=>{if(ki.value.startsWith(‘sk-’)){state.apiKey=ki.value;localStorage.setItem(‘radar-api-key’,ki.value);}};
const kb=document.getElementById(‘keyBtn’);if(kb)kb.onclick=()=>{const v=document.getElementById(‘keyIn’).value;if(v.startsWith(‘sk-’)){state.apiKey=v;localStorage.setItem(‘radar-api-key’,v);render();}};
const si=document.getElementById(‘studioInput’);if(si){si.onkeydown=(e)=>{if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();state.stQuery=si.value;runStudio(si.value);}}}
const rb=document.getElementById(‘runStudio’);if(rb)rb.onclick=()=>{const si=document.getElementById(‘studioInput’);if(si){state.stQuery=si.value;runStudio(si.value);}};
}

// ─── INIT ───
loadStored();
render();
</script>

</body>
</html>
