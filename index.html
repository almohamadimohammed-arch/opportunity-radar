<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Opportunity Radar</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0A0C10;color:#EAEDF3;font-family:'Outfit',sans-serif}#app{padding:16px;max-width:800px;margin:0 auto}.card{background:#151922;border:1px solid #222838;border-radius:8px;padding:16px;margin-bottom:10px}.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;border:none}.btn-g{background:#C9A227;color:#0A0C10}.btn-g:disabled{opacity:.5}.btn-o{background:transparent;color:#8B95A8;border:1px solid #222838}.btn-o.on{color:#C9A227;border-color:#C9A22744;background:#C9A2270a}.inp{background:#1A1F2B;border:1px solid #222838;border-radius:5px;padding:8px 12px;color:#EAEDF3;font-size:13px;font-family:'Outfit',sans-serif;outline:none;width:100%}textarea.inp{min-height:60px;resize:vertical}.hdr{background:#10131A;border-bottom:1px solid #222838;padding:0 16px;position:sticky;top:0;z-index:99}.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:50px;max-width:800px;margin:0 auto}.tab{padding:6px 14px;font-size:11px;font-weight:500;color:#5A6478;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Outfit',sans-serif}.tab.on{color:#C9A227;border-bottom-color:#C9A227}@keyframes spin{to{transform:rotate(360deg)}}.spinner{width:20px;height:20px;border:2px solid #222838;border-top-color:#C9A227;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}</style></head><body><div id="error-display"></div><div id="app"><div style="text-align:center;padding:60px 20px"><div class="spinner" style="margin:0 auto 16px"></div><div style="color:#8B95A8;font-size:13px">Loading signals...</div></div></div><script>
var S={view:'signals',role:'entrepreneur',scope:'all',signals:[],opps:[],lastSig:null,lastOpp:null,stQuery:'',stResult:null,stRaw:'',stLoading:false,fw:'strategic',groqKey:localStorage.getItem('radar-groq-key')||''};
function bg(t,c){return'<span class="badge" style="background:'+c+'14;color:'+c+';border:1px solid '+c+'28">'+t+'</span>';}
function hrsAgo(ts){if(!ts)return null;return Math.round((Date.now()-new Date(ts).getTime())/3600000);}
function exJSON(text){var bt=String.fromCharCode(96);var c=text.replace(new RegExp(bt+'+json\\s*','gi'),'').replace(new RegExp(bt+'+\\s*','g'),'').trim();try{return JSON.parse(c);}catch(e){}var d=0,s=-1;for(var i=0;i<c.length;i++){if(c[i]==='['||c[i]==='{'){if(d===0)s=i;d++;}if(c[i]===']'||c[i]==='}'){d--;if(d===0&&s>=0){try{return JSON.parse(c.slice(s,i+1));}catch(e){s=-1;}}}}return null;}
function loadData(){
fetch('signals.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){if(d&&d.items){S.signals=d.items;S.lastSig=d.lastRefresh;}draw();}).catch(function(){draw();});
fetch('opps.json?v='+Date.now()).then(function(r){return r.json();}).then(function(d){if(d&&d.items){S.opps=d.items;S.lastOpp=d.lastRefresh;}draw();}).catch(function(){draw();});
}
function runStudio(q){if(!q)return;if(!S.groqKey){S.stRaw='Enter your Groq API key first. Tap the key icon in the header.';S.stLoading=false;draw();return;}S.stLoading=true;S.stResult=null;S.stRaw='';S.stQuery=q;draw();var sig=S.signals.slice(0,15).map(function(s){return s.headline+': '+(s.context||'');}).join('\n');var opp=S.opps.slice(0,6).map(function(o){return(o.title||'')+' Score:'+(o.score||'')+' '+(o.marketSize||'');}).join('\n');fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+S.groqKey,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:'AI Decision Engine for Saudi Vision 2030. Respond ONLY with JSON object:\n{"title":"...","subtitle":"...","metrics":[{"value":"...","label":"...","icon":"..."}],"summary":"...","sections":[{"heading":"...","content":"..."}],"verdict":"..."}\n\nSIGNALS:\n'+(sig||'None')+'\nOPPORTUNITIES:\n'+(opp||'None')+'\nFRAMEWORK:'+S.fw+' ROLE:'+S.role+'\nQUERY:'+q}],temperature:0.3,max_tokens:3000})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('API '+r.status+': '+t.slice(0,100));});return r.json();}).then(function(d){var text=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'';var p=exJSON(text);if(p&&p.title)S.stResult=p;else S.stRaw=text||'No response.';S.stLoading=false;draw();}).catch(function(e){S.stRaw='Error: '+e.message;S.stLoading=false;draw();});}
function rr(d){var h='';if(d.title)h+='<div style="font-size:18px;font-weight:600;margin-bottom:6px">'+d.title+'</div>';if(d.subtitle)h+='<div style="font-size:12px;color:#8B95A8;margin-bottom:16px">'+d.subtitle+'</div>';if(d.metrics&&d.metrics.length){var cols=['#C9A227','#10B981','#4A90D9','#22D3EE'];h+='<div style="display:grid;grid-template-columns:repeat('+Math.min(d.metrics.length,4)+',1fr);gap:8px;margin-bottom:16px">';d.metrics.forEach(function(m,i){var c=cols[i%4];h+='<div style="background:'+c+'10;border:1px solid '+c+'30;border-radius:8px;padding:14px;text-align:center">';if(m.icon)h+='<div style="font-size:16px;margin-bottom:4px">'+m.icon+'</div>';h+='<div style="font-size:22px;font-weight:700;color:'+c+';margin-bottom:4px">'+m.value+'</div><div style="font-size:10px;color:#8B95A8">'+m.label+'</div></div>';});h+='</div>';}if(d.summary)h+='<div style="background:#C9A22708;border:1px solid #C9A22720;border-radius:8px;padding:14px;margin-bottom:16px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">Summary</div><div style="font-size:12px;line-height:1.7">'+d.summary+'</div></div>';if(d.pestel&&d.pestel.length){var pc={Political:'#4A90D9',Economic:'#C9A227',Social:'#22D3EE',Technological:'#A78BFA',Environmental:'#10B981',Legal:'#F59E0B'};d.pestel.forEach(function(p){var c=pc[p.name]||'#C9A227';var rc=p.rating==='FAVORABLE'?'#10B981':p.rating==='UNFAVORABLE'?'#EF4444':'#C9A227';h+='<div style="background:'+c+'08;border-left:3px solid '+c+';border-radius:0 6px 6px 0;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:'+c+';text-transform:uppercase">'+p.name+'</span><span style="font-size:9px;font-weight:700;color:'+rc+';background:'+rc+'18;padding:2px 8px;border-radius:3px">'+p.rating+'</span></div><div style="font-size:11px;line-height:1.6">'+p.detail+'</div></div>';});}if(d.risks&&d.risks.length){var rk={Critical:'#EF4444',High:'#F59E0B',Medium:'#C9A227',Low:'#10B981'};h+='<div style="background:#1A1F2B;border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid #222838"><div style="font-size:10px;font-weight:700;color:#EF4444;text-transform:uppercase;margin-bottom:10px">Risks</div>';d.risks.forEach(function(r){var prc=rk[r.probability]||'#C9A227';var irc=rk[r.impact]||'#C9A227';h+='<div style="padding:8px 0;border-bottom:1px solid #22283822"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">'+r.name+'</span><div><span style="font-size:9px;font-weight:700;color:'+prc+';background:'+prc+'18;padding:2px 6px;border-radius:3px;margin-right:4px">P:'+r.probability+'</span><span style="font-size:9px;font-weight:700;color:'+irc+';background:'+irc+'18;padding:2px 6px;border-radius:3px">I:'+r.impact+'</span></div></div><div style="font-size:10px;color:#8B95A8;line-height:1.5">'+(r.mitigation||'')+'</div></div>';});h+='</div>';}if(d.sections){d.sections.forEach(function(s){h+='<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:'+(s.color||'#4A90D9')+';text-transform:uppercase;margin-bottom:6px">'+s.heading+'</div><div style="font-size:12px;line-height:1.7">'+s.content+'</div></div>';});}if(d.verdict)h+='<div style="background:linear-gradient(135deg,#C9A22712,#C9A22706);border:1px solid #C9A22730;border-radius:8px;padding:16px;margin-top:14px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">Verdict</div><div style="font-size:13px;font-weight:500;color:#E2C15E;line-height:1.6">'+d.verdict+'</div></div>';return h;}
function draw(){var app=document.getElementById('app');var oldH=document.getElementById('hdr-el');if(oldH)oldH.remove();var hdr=document.createElement('div');hdr.id='hdr-el';hdr.innerHTML='<div class="hdr"><div class="hdr-inner"><span style="font-weight:600;color:#C9A227">&#9673; Radar</span><div style="display:flex;gap:2px"><button class="tab'+(S.view==='signals'?' on':'')+'" id="navSig">Signals</button><button class="tab'+(S.view==='opportunities'?' on':'')+'" id="navOpp">Opps</button><button class="tab'+(S.view==='studio'?' on':'')+'" id="navStu">Studio</button></div><button class="btn btn-o" id="keyToggle" style="padding:3px 8px;font-size:10px">&#128273;</button></div></div>';document.body.insertBefore(hdr,app);document.getElementById('navSig').onclick=function(){S.view='signals';draw();};document.getElementById('navOpp').onclick=function(){S.view='opportunities';draw();};document.getElementById('navStu').onclick=function(){S.view='studio';draw();};document.getElementById('keyToggle').onclick=function(){var k=prompt('Enter Groq API key for AI Studio (free at groq.com):',S.groqKey||'');if(k!==null){S.groqKey=k.trim();localStorage.setItem('radar-groq-key',S.groqKey);}};var html='';
if(S.view==='signals'){var local=S.signals.filter(function(s){return s.scope==='local';}).length;var global=S.signals.filter(function(s){return s.scope==='global';}).length;var h=hrsAgo(S.lastSig);html+='<h2 style="font-size:20px;font-weight:600;margin-bottom:4px">Signal Detection Engine</h2><p style="color:#8B95A8;font-size:12px;margin-bottom:14px">Auto-updated daily at 2:00 AM AST. Tap any signal to analyze.</p>';html+='<div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><div style="font-size:11px;color:#8B95A8">Total <b>'+S.signals.length+'</b> | Local '+local+' | Global '+global+(h!==null?' | Updated '+h+'h ago':'')+'</div><div style="font-size:10px;color:#10B981">Auto-refresh daily</div></div>';html+='<div style="display:flex;gap:6px;margin-bottom:12px">';['all','local','global'].forEach(function(sc){html+='<button class="btn btn-o'+(S.scope===sc?' on':'')+'" id="scope_'+sc+'">'+(sc==='all'?'All':sc==='local'?'Local':'Global')+'</button>';});html+='</div>';var filtered=S.signals.filter(function(s){if(S.scope==='local'&&s.scope!=='local')return false;if(S.scope==='global'&&s.scope!=='global')return false;return true;});if(filtered.length===0){html+='<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;font-size:12px">Signals loading... If empty, the daily scrape may still be running. Check back in a few minutes.</p></div>';}filtered.forEach(function(s,i){html+='<div class="card" style="cursor:pointer" data-sidx="'+i+'"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">'+bg(s.scope||'',s.scope==='global'?'#A78BFA':'#22D3EE')+' '+bg(s.impact||'',s.impact==='critical'?'#EF4444':s.impact==='high'?'#F59E0B':'#C9A227')+' '+bg(s.sector||'','#4A90D9')+(s.type?' '+bg(s.type,'#8B95A8'):'')+'</div><div style="font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4">'+(s.headline||'')+'</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:4px">'+(s.context||'')+'</div><div style="display:flex;justify-content:space-between;font-size:10px;color:#5A6478"><span>'+(s.source||'')+' | '+(s.date||'')+'</span><span style="color:#C9A227;font-weight:600">Analyze</span></div></div>';});}
if(S.view==='opportunities'){html+='<h2 style="font-size:20px;font-weight:600;margin-bottom:4px">Opportunity Explorer</h2><p style="color:#8B95A8;font-size:12px;margin-bottom:14px">AI-scored from signal clusters. Auto-generated daily.</p>';html+='<div class="card"><span style="font-size:11px;color:#8B95A8"><b>'+S.opps.length+'</b> opportunities from <b>'+S.signals.length+'</b> signals</span></div>';if(!S.opps.length){html+='<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;font-size:12px">Opportunities loading... Check back shortly.</p></div>';}S.opps.forEach(function(o,i){var sc=o.score||75;var col=sc>=90?'#10B981':sc>=80?'#C9A227':'#F59E0B';html+='<div class="card" style="cursor:pointer" data-oidx="'+i+'"><div style="display:flex;gap:12px"><div style="width:48px;height:48px;border-radius:50%;border:3px solid '+col+';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:'+col+';flex-shrink:0">'+sc+'</div><div style="flex:1"><div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">'+bg(o.sector||'','#C9A227')+(o.region?' '+bg(o.region,'#10B981'):'')+(o.urgency?' '+bg(o.urgency,'#22D3EE'):'')+'</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">'+(o.title||'')+'</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:6px">'+(o.description||'')+'</div><div style="font-size:11px;color:#5A6478">'+(o.marketSize?'Market: <b style="color:#C9A227">'+o.marketSize+'</b> ':'')+(o.growth?'Growth: <b style="color:#10B981">'+o.growth+'</b>':'')+'</div></div></div></div>';});}
if(S.view==='studio'){html+='<h2 style="font-size:20px;font-weight:600;margin-bottom:4px">AI Decision Studio</h2><p style="color:#8B95A8;font-size:12px;margin-bottom:14px">'+S.signals.length+' signals | '+S.opps.length+' opportunities'+(S.groqKey?' | Groq connected':' | Tap &#128273; to add Groq key')+'</p>';html+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';[['strategic','Strategic'],['pestel','PESTEL'],['risk','Risk'],['competitive','Competitive']].forEach(function(f){html+='<button class="btn btn-o'+(S.fw===f[0]?' on':'')+'" id="fw_'+f[0]+'" style="font-size:10px;padding:4px 10px">'+f[1]+'</button>';});html+='</div>';html+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';['Top opportunities now','PESTEL: Saudi AI sector','Risk: Red Sea logistics','Compare sectors for entry'].forEach(function(q){html+='<button class="btn btn-o" data-sq="'+q+'" style="font-size:9px;padding:3px 8px">'+q+'</button>';});html+='</div>';html+='<div class="card"><textarea class="inp" id="studioIn" placeholder="Ask about signals, opportunities, risks...">'+(S.stQuery||'')+'</textarea><div style="margin-top:8px"><button class="btn btn-g" id="btnStudio"'+(S.stLoading?' disabled':'')+'>'+(S.stLoading?'Analyzing...':'Run Agent')+'</button></div></div>';if(S.stLoading){html+='<div class="card" style="text-align:center;padding:30px;color:#C9A227"><div class="spinner" style="margin:0 auto 12px"></div>Analyzing...</div>';}if(S.stResult&&!S.stLoading){html+='<div class="card">'+rr(S.stResult)+'</div>';}if(S.stRaw&&!S.stResult&&!S.stLoading){html+='<div class="card"><div style="font-size:12px;line-height:1.7;white-space:pre-wrap">'+S.stRaw+'</div></div>';}}
app.innerHTML=html;['all','local','global'].forEach(function(sc){var btn=document.getElementById('scope_'+sc);if(btn)btn.onclick=function(){S.scope=sc;draw();};});['strategic','pestel','risk','competitive'].forEach(function(f){var btn=document.getElementById('fw_'+f);if(btn)btn.onclick=function(){S.fw=f;draw();};});var sb=document.getElementById('btnStudio');if(sb)sb.onclick=function(){var inp=document.getElementById('studioIn');if(inp&&inp.value)runStudio(inp.value);};document.querySelectorAll('[data-sq]').forEach(function(el){el.onclick=function(){S.stQuery=el.dataset.sq;runStudio(el.dataset.sq);};});document.querySelectorAll('[data-sidx]').forEach(function(el){el.onclick=function(){var filtered=S.signals.filter(function(s){if(S.scope==='local'&&s.scope!=='local')return false;if(S.scope==='global'&&s.scope!=='global')return false;return true;});var s=filtered[parseInt(el.dataset.sidx)];if(s){S.view='studio';S.stQuery='Analyze: "'+s.headline+'" - implications for Saudi Arabia.';draw();setTimeout(function(){runStudio(S.stQuery);},100);}};});document.querySelectorAll('[data-oidx]').forEach(function(el){el.onclick=function(){var o=S.opps[parseInt(el.dataset.oidx)];if(o){S.view='studio';S.stQuery='Deep analysis: "'+(o.title||'')+'" (Score:'+(o.score||'')+', Market:'+(o.marketSize||'')+')';draw();setTimeout(function(){runStudio(S.stQuery);},100);}};});}
loadData();
</script></body></html>
