<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0C10;color:#EAEDF3;font-family:'Outfit',sans-serif}
#app{padding:16px;max-width:800px;margin:0 auto}
.card{background:#151922;border:1px solid #222838;border-radius:8px;padding:16px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;border:none}
.btn-g{background:#C9A227;color:#0A0C10}
.btn-g:disabled{opacity:.5}
.btn-o{background:transparent;color:#8B95A8;border:1px solid #222838}
.btn-o.on{color:#C9A227;border-color:#C9A22744;background:#C9A2270a}
.inp{background:#1A1F2B;border:1px solid #222838;border-radius:5px;padding:8px 12px;color:#EAEDF3;font-size:13px;font-family:'Outfit',sans-serif;outline:none;width:100%}
textarea.inp{min-height:60px;resize:vertical}
.err{background:#2a1015;border:1px solid #EF444444;border-radius:8px;padding:16px;color:#EF4444;font-size:12px;margin:16px;word-break:break-all}
.hdr{background:#10131A;border-bottom:1px solid #222838;padding:0 16px;position:sticky;top:0;z-index:99}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:50px;max-width:800px;margin:0 auto}
.tab{padding:6px 14px;font-size:11px;font-weight:500;color:#5A6478;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Outfit',sans-serif}
.tab.on{color:#C9A227;border-bottom-color:#C9A227}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid #222838;border-top-color:#C9A227;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ld{animation:pulse 1.5s infinite}
</style>
</head>
<body>
<div id="error-display"></div>
<div id="app"><div style="text-align:center;padding:60px 20px"><div class="spinner" style="margin:0 auto 16px"></div><div style="color:#8B95A8;font-size:13px">Loading...</div></div></div>
<script>
window.onerror=function(msg,src,line){document.getElementById('error-display').innerHTML='<div class="err"><b>Error:</b> '+msg+'<br>Line: '+line+'</div>';};
try{
var S={view:'signals',role:'entrepreneur',scope:'all',apiKey:localStorage.getItem('radar-api-key')||'',signals:[],opps:[],lastSig:null,lastOpp:null,sigLoading:false,oppLoading:false,sigMsg:'',oppMsg:'',stQuery:'',stResult:null,stRaw:'',stLoading:false,fw:'strategic'};
try{var sd=JSON.parse(localStorage.getItem('radar-signals'));if(sd&&sd.items){S.signals=sd.items;S.lastSig=sd.lastRefresh;}}catch(e){}
try{var od=JSON.parse(localStorage.getItem('radar-opportunities'));if(od&&od.items){S.opps=od.items;S.lastOpp=od.lastRefresh;}}catch(e){}
function bg(t,c){return'<span class="badge" style="background:'+c+'14;color:'+c+';border:1px solid '+c+'28">'+t+'</span>';}
function hAgo(ts){return ts?Math.round((Date.now()-new Date(ts).getTime())/3600000):null;}
function exJSON(t){var c=t.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();try{return JSON.parse(c)}catch(e){}var d=0,s=-1;for(var i=0;i<c.length;i++){if(c[i]==='{'||c[i]==='['){if(!d)s=i;d++}if(c[i]==='}'||c[i]===']'){d--;if(!d&&s>=0){try{return JSON.parse(c.slice(s,i+1))}catch(e){s=-1}}}}return null;}
function callAPI(msgs,search){var b={model:'claude-sonnet-4-20250514',max_tokens:4096,messages:msgs};if(search)b.tools=[{type:'web_search_20250305',name:'web_search'}];return fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(b)}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('API '+r.status+': '+t.slice(0,100))});return r.json()}).then(function(d){return(d.content||[]).filter(function(b){return b.type==='text'}).map(function(b){return b.text}).join('\n')});}
function fetchSignals(){S.sigLoading=true;S.sigMsg='Searching latest news...';draw();var today=new Date().toISOString().split('T')[0];callAPI([{role:'user',content:'Signal Detection Engine for Saudi Vision 2030. TODAY:'+today+'\n\nSearch web for REAL current news. Generate exactly 10 Saudi local + 8 global signals.\n\nLOCAL: regulations, investments, tenders, mega-projects, economic indicators\nGLOBAL: geopolitics, tech disruptions, trade policy, energy shifts\n\nRespond ONLY JSON array:\n[{"scope":"local","headline":"...","sector":"...","region":"...","date":"YYYY-MM-DD","impact":"critical|high|medium","source":"...","type":"...","context":"..."}]'}],true).then(function(text){var p=exJSON(text);if(Array.isArray(p)&&p.length>0){var ex={};S.signals.forEach(function(s){ex[s.headline]=true});var fresh=[];p.forEach(function(s){if(!ex[s.headline]){s._at=new Date().toISOString();fresh.push(s)}});S.signals=fresh.concat(S.signals);S.lastSig=new Date().toISOString();localStorage.setItem('radar-signals',JSON.stringify({items:S.signals,lastRefresh:S.lastSig}));S.sigMsg=fresh.length+' new signals. '+S.signals.length+' total.'}else{S.sigMsg='Could not parse. Try again.'}S.sigLoading=false;draw()}).catch(function(e){S.sigMsg='Error: '+e.message;S.sigLoading=false;draw()});}
function genOpps(){if(!S.signals.length){S.oppMsg='Load signals first.';draw();return}S.oppLoading=true;S.oppMsg='Synthesizing...';draw();var ctx=S.signals.slice(0,20).map(function(s){return'['+s.scope+']['+s.impact+'] '+s.headline+' | '+s.sector+': '+(s.context||'')}).join('\n');callAPI([{role:'user',content:'Analyze signals. Generate 5-8 scored Saudi opportunities.\n\nSIGNALS:\n'+ctx+'\n\nRespond ONLY JSON array:\n[{"title":"...","sector":"...","region":"...","score":85,"urgency":"Emerging","marketSize":"$X.XB","growth":"+XX%","description":"...","investment":"$X-XM","scores":{"v2030":90,"regulatory":85,"market":88,"ease":70,"competition":75}}]'}],false).then(function(text){var p=exJSON(text);if(Array.isArray(p)&&p.length>0){p.forEach(function(o){o._at=new Date().toISOString()});S.opps=p.sort(function(a,b){return(b.score||0)-(a.score||0)});S.lastOpp=new Date().toISOString();localStorage.setItem('radar-opportunities',JSON.stringify({items:S.opps,lastRefresh:S.lastOpp}));S.oppMsg=p.length+' opportunities generated.'}else{S.oppMsg='Could not parse.'}S.oppLoading=false;draw()}).catch(function(e){S.oppMsg='Error: '+e.message;S.oppLoading=false;draw()});}
function runStudio(q){if(!q)return;S.stLoading=true;S.stResult=null;S.stRaw='';S.stQuery=q;draw();var sig=S.signals.slice(0,15).map(function(s){return s.headline+': '+(s.context||'')}).join('\n');var opp=S.opps.slice(0,6).map(function(o){return o.title+' Score:'+o.score+' '+o.marketSize}).join('\n');callAPI([{role:'user',content:'AI Decision Engine for Saudi Vision 2030. Respond ONLY JSON:\n{"title":"...","subtitle":"...","metrics":[{"value":"...","label":"...","icon":"..."}],"summary":"...","sections":[{"heading":"...","content":"..."}],"verdict":"..."}\n\nSIGNALS:\n'+(sig||'None')+'\nOPPS:\n'+(opp||'None')+'\nFRAMEWORK:'+S.fw+' ROLE:'+S.role+'\nQUERY:'+q}],true).then(function(text){var p=exJSON(text);if(p&&p.title)S.stResult=p;else S.stRaw=text;S.stLoading=false;draw()}).catch(function(e){S.stRaw='Error: '+e.message;S.stLoading=false;draw()});}
function draw(){var app=document.getElementById('app');if(!S.apiKey){app.innerHTML='<div style="text-align:center;padding:40px 0"><div style="font-size:28px;margin-bottom:12px">◉</div><div style="font-size:20px;font-weight:600;color:#C9A227;margin-bottom:20px">Opportunity Radar</div><p style="font-size:12px;color:#8B95A8;margin-bottom:16px">Enter your Anthropic API key.<br>Stored only in your browser.</p><input class="inp" id="keyIn" type="password" placeholder="sk-ant-api03-..." style="margin-bottom:12px"><br><button class="btn btn-g" id="keyBtn" style="width:100%;padding:12px">Save and Launch</button></div>';document.getElementById('keyBtn').onclick=function(){var v=document.getElementById('keyIn').value;if(v.indexOf('sk-')===0){S.apiKey=v;localStorage.setItem('radar-api-key',v);draw()}};return}
var hdr=document.getElementById('hdrEl');if(!hdr){hdr=document.createElement('div');hdr.id='hdrEl';hdr.className='hdr';document.body.insertBefore(hdr,app)}
hdr.innerHTML='<div class="hdr-inner"><span style="font-weight:600;color:#C9A227">◉ Radar</span><div><button class="tab'+(S.view==='signals'?' on':'')+'" id="navSig">◈ Signals</button><button class="tab'+(S.view==='opportunities'?' on':'')+'" id="navOpp">◆ Opps</button><button class="tab'+(S.view==='studio'?' on':'')+'" id="navStu">⚡ Studio</button></div><select class="inp" id="roleSel" style="width:auto;padding:3px 6px;font-size:10px"><option value="entrepreneur"'+(S.role==='entrepreneur'?' selected':'')+'>Entrepreneur</option><option value="investor"'+(S.role==='investor'?' selected':'')+'>Investor</option><option value="policymaker"'+(S.role==='policymaker'?' selected':'')+'>Policy Maker</option></select></div>';
document.getElementById('navSig').onclick=function(){S.view='signals';draw()};
document.getElementById('navOpp').onclick=function(){S.view='opportunities';draw()};
document.getElementById('navStu').onclick=function(){S.view='studio';draw()};
document.getElementById('roleSel').onchange=function(){S.role=this.value};
var h='';
if(S.view==='signals'){
var lc=S.signals.filter(function(s){return s.scope==='local'}).length;
var gc=S.signals.filter(function(s){return s.scope==='global'}).length;
var ha=hAgo(S.lastSig);
h='<h2 style="font-size:20px;font-weight:600;margin-bottom:14px">Signal Detection Engine</h2>';
h+='<div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span style="font-size:11px;color:#8B95A8">📡 <b>'+S.signals.length+'</b> · 🇸🇦 '+lc+' · 🌐 '+gc+(ha!==null?' · '+ha+'h ago':'')+'</span><button class="btn btn-g" id="bRS"'+(S.sigLoading?' disabled':'')+'>'+(S.sigLoading?'⏳ Scanning...':'🔄 Refresh')+'</button></div>';
if(S.sigMsg)h+='<div class="card" style="font-size:11px;color:'+(S.sigMsg.indexOf('Error')>=0?'#EF4444':'#C9A227')+'">'+S.sigMsg+'</div>';
h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
['all','local','global'].forEach(function(sc){h+='<button class="btn btn-o'+(S.scope===sc?' on':'')+'" data-sc="'+sc+'">'+(sc==='all'?'All':sc==='local'?'🇸🇦 Local':'🌐 Global')+'</button>'});
h+='</div>';
var fil=S.signals.filter(function(s){if(S.scope==='local'&&s.scope!=='local')return false;if(S.scope==='global'&&s.scope!=='global')return false;return true});
if(!fil.length&&!S.sigLoading)h+='<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;margin-bottom:14px">No signals yet. Tap Refresh.</p><button class="btn btn-g" id="bRS2">🔄 Refresh Signals</button></div>';
fil.forEach(function(s,i){h+='<div class="card" style="cursor:pointer" data-si="'+i+'"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">'+bg(s.scope,s.scope==='global'?'#A78BFA':'#22D3EE')+' '+bg(s.impact,s.impact==='critical'?'#EF4444':s.impact==='high'?'#F59E0B':'#C9A227')+' '+bg(s.sector||'','#4A90D9')+'</div><div style="font-size:13px;font-weight:600;margin-bottom:4px">'+s.headline+'</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:4px">'+(s.context||'')+'</div><div style="display:flex;justify-content:space-between;font-size:10px;color:#5A6478"><span>'+(s.source||'')+' · '+(s.date||'')+'</span><span style="color:#C9A227;font-weight:600">⚡ Analyze</span></div></div>'});
}
if(S.view==='opportunities'){
h='<h2 style="font-size:20px;font-weight:600;margin-bottom:14px">Opportunity Explorer</h2>';
h+='<div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span style="font-size:11px;color:#8B95A8">◆ <b>'+S.opps.length+'</b> from <b>'+S.signals.length+'</b> signals</span><button class="btn btn-g" id="bGO"'+(S.oppLoading||!S.signals.length?' disabled':'')+'>'+(S.oppLoading?'⏳...':'🔄 Generate')+'</button></div>';
if(S.oppMsg)h+='<div class="card" style="font-size:11px;color:#C9A227">'+S.oppMsg+'</div>';
if(!S.opps.length&&!S.oppLoading)h+='<div class="card" style="text-align:center;padding:30px"><p style="color:#8B95A8;margin-bottom:14px">'+(!S.signals.length?'Load signals first.':'Tap Generate.')+'</p><button class="btn btn-g" id="'+(S.signals.length?'bGO2':'bRS3')+'">'+(S.signals.length?'🔄 Generate':'🔄 Load Signals')+'</button></div>';
S.opps.forEach(function(o,i){var sc=o.score||75;var cl=sc>=90?'#10B981':sc>=80?'#C9A227':'#F59E0B';h+='<div class="card" style="cursor:pointer" data-oi="'+i+'"><div style="display:flex;gap:12px"><div style="width:46px;height:46px;border-radius:50%;border:3px solid '+cl+';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:'+cl+';flex-shrink:0">'+sc+'</div><div style="flex:1"><div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">'+bg(o.sector||'','#C9A227')+' '+(o.region?bg(o.region,'#10B981'):'')+' '+(o.urgency?bg(o.urgency,'#22D3EE'):'')+'</div><div style="font-size:14px;font-weight:600;margin-bottom:4px">'+(o.title||'')+'</div><div style="font-size:11px;color:#8B95A8;line-height:1.5;margin-bottom:6px">'+(o.description||'')+'</div><div style="font-size:11px;color:#5A6478">'+(o.marketSize?'Market:<b style="color:#C9A227">'+o.marketSize+'</b> ':'')+(o.growth?'Growth:<b style="color:#10B981">'+o.growth+'</b>':'')+'</div></div></div></div>'});
}
if(S.view==='studio'){
h='<h2 style="font-size:20px;font-weight:600;margin-bottom:14px">AI Decision Studio</h2>';
h+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
[['strategic','🔬 Strategic'],['pestel','🌍 PESTEL'],['risk','⚠️ Risk'],['competitive','🏁 Competitive']].forEach(function(f){h+='<button class="btn btn-o'+(S.fw===f[0]?' on':'')+'" data-fw="'+f[0]+'" style="font-size:10px;padding:4px 10px">'+f[1]+'</button>'});
h+='</div>';
h+='<div class="card"><textarea class="inp" id="stIn" placeholder="Ask about signals, opportunities, risks...">'+(S.stQuery||'')+'</textarea><div style="margin-top:8px"><button class="btn btn-g" id="bSt"'+(S.stLoading?' disabled':'')+'>'+(S.stLoading?'⏳ Analyzing...':'⚡ Run Agent')+'</button></div></div>';
if(S.stLoading)h+='<div class="card" style="text-align:center;padding:30px;color:#C9A227" class="ld"><div class="spinner" style="margin:0 auto 12px"></div>Analyzing...</div>';
if(S.stResult&&!S.stLoading){var d=S.stResult;h+='<div class="card">';
if(d.title)h+='<div style="font-size:18px;font-weight:600;margin-bottom:6px">'+d.title+'</div>';
if(d.subtitle)h+='<div style="font-size:12px;color:#8B95A8;margin-bottom:16px">'+d.subtitle+'</div>';
if(d.metrics&&d.metrics.length){var cs=['#C9A227','#10B981','#4A90D9','#22D3EE'];h+='<div style="display:grid;grid-template-columns:repeat('+Math.min(d.metrics.length,4)+',1fr);gap:8px;margin-bottom:16px">';d.metrics.forEach(function(m,i){var c=cs[i%4];h+='<div style="background:'+c+'10;border:1px solid '+c+'30;border-radius:8px;padding:14px;text-align:center">'+(m.icon?'<div style="font-size:16px;margin-bottom:4px">'+m.icon+'</div>':'')+'<div style="font-size:22px;font-weight:700;color:'+c+';margin-bottom:4px">'+m.value+'</div><div style="font-size:10px;color:#8B95A8">'+m.label+'</div></div>'});h+='</div>'}
if(d.summary)h+='<div style="background:#C9A22708;border:1px solid #C9A22720;border-radius:8px;padding:14px;margin-bottom:16px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">Summary</div><div style="font-size:12px;line-height:1.7">'+d.summary+'</div></div>';
if(d.pestel){var pc={Political:'#4A90D9',Economic:'#C9A227',Social:'#22D3EE',Technological:'#A78BFA',Environmental:'#10B981',Legal:'#F59E0B'};d.pestel.forEach(function(p){var c=pc[p.name]||'#C9A227';var rc=p.rating==='FAVORABLE'?'#10B981':p.rating==='UNFAVORABLE'?'#EF4444':'#C9A227';h+='<div style="background:'+c+'08;border-left:3px solid '+c+';border-radius:0 6px 6px 0;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:'+c+';text-transform:uppercase">'+p.name+'</span><span style="font-size:9px;font-weight:700;color:'+rc+';background:'+rc+'18;padding:2px 8px;border-radius:3px">'+p.rating+'</span></div><div style="font-size:11px;line-height:1.6">'+p.detail+'</div></div>'})}
if(d.risks){h+='<div style="background:#1A1F2B;border-radius:8px;padding:14px;margin-bottom:16px;border:1px solid #222838"><div style="font-size:10px;font-weight:700;color:#EF4444;text-transform:uppercase;margin-bottom:10px">⚠ Risks</div>';var rk={Critical:'#EF4444',High:'#F59E0B',Medium:'#C9A227',Low:'#10B981'};d.risks.forEach(function(r){h+='<div style="padding:8px 0;border-bottom:1px solid #22283822"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:600">'+r.name+'</span><div><span style="font-size:9px;font-weight:700;color:'+(rk[r.probability]||'#C9A227')+';background:'+(rk[r.probability]||'#C9A227')+'18;padding:2px 6px;border-radius:3px;margin-right:4px">P:'+r.probability+'</span><span style="font-size:9px;font-weight:700;color:'+(rk[r.impact]||'#C9A227')+';background:'+(rk[r.impact]||'#C9A227')+'18;padding:2px 6px;border-radius:3px">I:'+r.impact+'</span></div></div><div style="font-size:10px;color:#8B95A8;line-height:1.5">'+(r.mitigation||'')+'</div></div>'});h+='</div>'}
if(d.sections)d.sections.forEach(function(s){h+='<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:'+(s.color||'#4A90D9')+';text-transform:uppercase;margin-bottom:6px">'+s.heading+'</div><div style="font-size:12px;line-height:1.7">'+s.content+'</div></div>'});
if(d.verdict)h+='<div style="background:linear-gradient(135deg,#C9A22712,#C9A22706);border:1px solid #C9A22730;border-radius:8px;padding:16px;margin-top:14px"><div style="font-size:10px;font-weight:700;color:#C9A227;text-transform:uppercase;margin-bottom:6px">◉ Verdict</div><div style="font-size:13px;font-weight:500;color:#E2C15E;line-height:1.6">'+d.verdict+'</div></div>';
h+='</div>'}
if(S.stRaw&&!S.stResult&&!S.stLoading)h+='<div class="card"><div style="font-size:12px;line-height:1.7;white-space:pre-wrap">'+S.stRaw+'</div></div>';
}
app.innerHTML=h;
var r1=document.getElementById('bRS');if(r1)r1.onclick=fetchSignals;
var r2=document.getElementById('bRS2');if(r2)r2.onclick=fetchSignals;
var r3=document.getElementById('bRS3');if(r3)r3.onclick=fetchSignals;
var g1=document.getElementById('bGO');if(g1)g1.onclick=genOpps;
var g2=document.getElementById('bGO2');if(g2)g2.onclick=genOpps;
var sb=document.getElementById('bSt');if(sb)sb.onclick=function(){var i=document.getElementById('stIn');if(i)runStudio(i.value)};
document.querySelectorAll('[data-sc]').forEach(function(b){b.onclick=function(){S.scope=b.dataset.sc;draw()}});
document.querySelectorAll('[data-fw]').forEach(function(b){b.onclick=function(){S.fw=b.dataset.fw;draw()}});
document.querySelectorAll('[data-si]').forEach(function(el){el.onclick=function(){var fil=S.signals.filter(function(s){if(S.scope==='local'&&s.scope!=='local')return false;if(S.scope==='global'&&s.scope!=='global')return false;return true});var s=fil[parseInt(el.dataset.si)];if(s){S.view='studio';S.stQuery='Analyze: "'+s.headline+'" - Saudi implications.';draw();setTimeout(function(){runStudio(S.stQuery)},100)}}});
document.querySelectorAll('[data-oi]').forEach(function(el){el.onclick=function(){var o=S.opps[parseInt(el.dataset.oi)];if(o){S.view='studio';S.stQuery='Analyze: "'+o.title+'" Score:'+o.score+' Market:'+o.marketSize;draw();setTimeout(function(){runStudio(S.stQuery)},100)}}});
}
draw();
}catch(e){document.getElementById('error-display').innerHTML='<div class="err"><b>Startup Error:</b> '+e.message+'</div>'}
</script>
</body>
</html>
